<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Friction OS — Neuro-Gestalt</title>
  
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <link rel="stylesheet" href="/style.css">
  
  <style>
    /* Estilos críticos para el motor de renderizado */
    :root { 
      --neon: #E6FF00; 
      --void: #030305; 
      --gold: #C8A951; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--void);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* CAPAS DE FONDO (MAPA) */
    #sf-background-layers {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    canvas, #sf-canvas-2d svg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* NÚCLEO (INTERFAZ) */
    #sf-nucleus-control {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50; cursor: pointer;
      pointer-events: auto;
      text-align: center;
      transition: opacity 0.5s;
    }

    #sf-nucleus {
      filter: drop-shadow(0 0 10px var(--neon));
      transition: transform 0.3s var(--ease);
    }
    #sf-nucleus:hover { transform: scale(1.1); }

    #sf-nucleus-label {
      margin-top: 20px; font-size: 10px;
      letter-spacing: 0.2em; color: var(--neon);
      opacity: 0.6; text-transform: uppercase;
    }

    /* ESCENARIO DE CONTENIDO */
    #sf-main-stage {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100; pointer-events: none;
      opacity: 0; transition: opacity 0.5s var(--ease);
      background: rgba(8, 8, 8, 0.96);
      backdrop-filter: blur(10px);
      overflow-y: auto;
    }

    #sf-main-stage.loaded { opacity: 1; pointer-events: auto; }

    .sf-content-wrapper {
      max-width: 900px; margin: 80px auto; padding: 20px;
      line-height: 1.8;
    }

    #sf-close-btn {
      position: fixed; top: 30px; right: 30px;
      border: 1px solid var(--neon); color: var(--neon);
      background: transparent; padding: 10px 20px;
      cursor: pointer; font-family: var(--font); font-size: 10px;
    }
  </style>
</head>
<body class="desktop">

  <div id="sf-background-layers">
    <canvas id="sf-canvas-3d"></canvas>
    <div id="sf-canvas-2d"></div>
  </div>

  <div id="sf-nucleus-control" onclick="handleNucleusInteraction()">
    <svg id="sf-nucleus" width="60" height="60" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="14" fill="#C8A951" stroke="#E6FF00" stroke-width="1.5"/>
    </svg>
    <div id="sf-nucleus-label">INITIALIZING SYSTEM...</div>
  </div>

  <div id="sf-main-stage">
    <button id="sf-close-btn" onclick="closeStage()">[CLOSE_INTERFACE]</button>
    <div class="sf-content-wrapper" id="sf-content"></div>
  </div>

  <script src="/js/state.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/core.js"></script>

  <script>
    const isMobile = window.innerWidth < 768;
    document.body.className = isMobile ? 'mobile' : 'desktop';

    let particles = [];
    let collapsing = false;
    let systemStable = false;

    // ===== MOTOR DE CAOS (NEURO-GESTALT) =====
    const canvas2dContainer = document.getElementById('sf-canvas-2d');
    const d3Canvas = d3.select(canvas2dContainer).append('canvas')
      .attr('width', window.innerWidth)
      .attr('height', window.innerHeight)
      .node();
    const ctx = d3Canvas.getContext('2d');

    // Inicializar partículas de caos
    for(let i=0; i<150; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10,
        size: Math.random() * 2 + 1
      });
    }

    function runNeuroGestalt() {
      if (systemStable && !collapsing) return;
      
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      particles.forEach(p => {
        if (collapsing) {
          p.vx = (centerX - p.x) * 0.12;
          p.vy = (centerY - p.y) * 0.12;
          p.size *= 0.98;
        } else {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > window.innerWidth) p.vx *= -1;
          if (p.y < 0 || p.y > window.innerHeight) p.vy *= -1;
        }

        ctx.fillStyle = 'rgba(230, 255, 0, 0.8)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(runNeuroGestalt);
    }

    runNeuroGestalt();

    // Protocolo de Colapso (Neuro-Gestalt)
    setTimeout(() => {
      collapsing = true;
      document.getElementById('sf-nucleus-label').textContent = 'COLLAPSING RENDERERS...';
      
      setTimeout(() => {
        systemStable = true;
        collapsing = false;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        document.getElementById('sf-nucleus-label').textContent = '[NUCLEUS] — STABLE';
        
        // Lanzar motor de fondo según dispositivo
        if (isMobile) initSphere3D();
        else initDesktopMap();
      }, 1500);
    }, 2500);

    // ===== MAPA DESKTOP (D3 FORCE GRAPH) =====
    function initDesktopMap() {
      // Aquí se restaura tu mapa de red con D3
      console.log("[SF] Restaurando Mapa Desktop...");
      const bgLayer = d3.select("#sf-canvas-2d").style("opacity", "0.2");
      // Integración de navTree aquí...
    }

    // ===== MAPA MÓVIL (THREE.JS SPHERE) =====
    function initSphere3D() {
      const canvas3d = document.getElementById('sf-canvas-3d');
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      const sphereGeo = new THREE.IcosahedronGeometry(2, 1);
      const sphereMat = new THREE.MeshBasicMaterial({ color: 0xE6FF00, wireframe: true, transparent: true, opacity: 0.3 });
      const sphere = new THREE.Mesh(sphereGeo, sphereMat);
      scene.add(sphere);
      camera.position.z = 5;

      function animate() {
        requestAnimationFrame(animate);
        sphere.rotation.y += 0.005;
        renderer.render(scene, camera);
      }
      animate();
    }

    // ===== INTERACCIÓN =====
    function handleNucleusInteraction() {
      if (!systemStable) return;
      // Lógica de expansión fractal usando router.js
      if (window.router && window.router.navigateFractal) {
        window.router.navigateFractal('observatorio');
      }
    }

    function closeStage() {
      document.getElementById('sf-main-stage').classList.remove('loaded');
    }
  </script>
</body>
</html>
