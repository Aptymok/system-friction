<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Friction OS — Neuro-Gestalt</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #030305;
      color: #E6FF00;
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    /* ===== CANVAS LAYER ===== */
    #sf-canvas-3d, #sf-canvas-2d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.1; /* Background opacity */
    }

    #sf-canvas-2d { display: none; }
    body.mobile #sf-canvas-2d { display: block; }
    body.desktop #sf-canvas-2d { display: none; }

    /* ===== CONTENT STAGE ===== */
    #sf-main-stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      background: transparent;
      pointer-events: none;
      overflow: hidden;
    }

    #sf-main-stage.loaded {
      pointer-events: auto;
      background: rgba(3, 3, 5, 0.96);
      overflow-y: auto;
      overflow-x: hidden;
      opacity: 1;
    }

    #sf-main-stage * { pointer-events: auto; }
    #sf-main-stage a { color: #E6FF00; text-decoration: underline; }
    #sf-main-stage h1, #sf-main-stage h2 { color: #FFD700; margin: 20px 0 12px 0; text-shadow: 0 0 10px rgba(230, 255, 0, 0.3); }
    #sf-main-stage p { line-height: 1.8; margin: 10px 0; }
    #sf-main-stage table { width: 100%; border-collapse: collapse; margin: 20px 0; background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(230, 255, 0, 0.2); }
    #sf-main-stage th, #sf-main-stage td { padding: 12px; text-align: left; border: 1px solid rgba(230, 255, 0, 0.15); }
    #sf-main-stage th { background: rgba(230, 255, 0, 0.1); font-weight: bold; }

    #sf-close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 11;
      background: transparent;
      border: 1px solid #E6FF00;
      color: #E6FF00;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      transition: all 0.2s;
      display: none;
      opacity: 1;
    }

    #sf-main-stage.loaded #sf-close-btn { display: block; }
    #sf-close-btn:hover { box-shadow: 0 0 10px #E6FF00; background: rgba(230, 255, 0, 0.1); }

    .sf-content-wrapper {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Nucleus Toggle Indicator */
    #sf-nucleus {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      cursor: pointer;
      transition: filter 0.3s;
    }

    #sf-nucleus:hover {
      filter: drop-shadow(0 0 15px #E6FF00);
    }

    #sf-nucleus-label {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 12px;
      color: #E6FF00;
      opacity: 0.6;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body class="desktop">
  <!-- Canvas Layers -->
  <canvas id="sf-canvas-3d"></canvas>
  <div id="sf-canvas-2d"></div>

  <!-- Nucleus Control -->
  <svg id="sf-nucleus" width="40" height="40" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="12" fill="#FFD700" stroke="#E6FF00" stroke-width="1.5" opacity="1"/>
  </svg>

  <!-- Content Stage -->
  <div id="sf-main-stage">
    <button id="sf-close-btn">[CLOSE]</button>
    <div class="sf-content-wrapper" id="sf-content"></div>
  </div>

  <div id="sf-nucleus-label">[NUCLEUS] — CLICK TO EXPAND</div>

  <!-- Scripts -->
  <script src="/js/state.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/core.js"></script>

  <script>
    // ===== DEVICE DETECTION =====
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
    document.body.classList.toggle('mobile', isMobile);
    document.body.classList.toggle('desktop', !isMobile);

    // ===== GLOBAL STATE =====
    window.nucleusExpanded = false;
    window.chaosParticles = [];
    window.collapsing = false;

    // ===== CHAOS PARTICLE SYSTEM =====
    class ChaosParticle {
      constructor() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 1;
        this.size = Math.random() * 3 + 1;
      }

      update(centerX, centerY, collapseProgress) {
        if (!window.collapsing) {
          // Chaos: random motion
          this.vx += (Math.random() - 0.5) * 0.5;
          this.vy += (Math.random() - 0.5) * 0.5;
          this.vx = Math.max(-8, Math.min(8, this.vx));
          this.vy = Math.max(-8, Math.min(8, this.vy));
        } else {
          // Collapse: accelerate toward center
          const dx = centerX - this.x;
          const dy = centerY - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 1) {
            this.vx = (dx / dist) * 20 * collapseProgress;
            this.vy = (dy / dist) * 20 * collapseProgress;
          }
        }

        this.x += this.vx;
        this.y += this.vy;

        // Bounce off edges
        if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
        if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;
        this.x = Math.max(0, Math.min(window.innerWidth, this.x));
        this.y = Math.max(0, Math.min(window.innerHeight, this.y));

        // Fade out during collapse
        this.life = Math.max(0, this.life - (window.collapsing ? 0.1 : 0));
      }

      draw(ctx) {
        ctx.fillStyle = `rgba(230, 255, 0, ${this.life * 0.8})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ===== 2D CHAOS (Desktop) =====
    function initChaos2D() {
      const canvas = document.getElementById('sf-canvas-2d');
      canvas.innerHTML = '';
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('width', window.innerWidth);
      svg.setAttribute('height', window.innerHeight);
      svg.setAttribute('style', 'position:absolute;top:0;left:0;');
      canvas.appendChild(svg);

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      // Create 150 chaos particles
      for (let i = 0; i < 150; i++) {
        window.chaosParticles.push(new ChaosParticle());
      }

      let chaosStart = Date.now();
      let animationId;

      function animateChaos() {
        const elapsed = (Date.now() - chaosStart) / 1000;
        const collapseProgress = Math.max(0, Math.min(1, (elapsed - 2.5) / 1.5));

        if (elapsed > 2.5 && !window.collapsing) {
          window.collapsing = true;
        }

        svg.innerHTML = '';

        // Draw connections
        if (!window.collapsing) {
          for (let i = 0; i < window.chaosParticles.length; i += 5) {
            for (let j = i + 1; j < Math.min(i + 4, window.chaosParticles.length); j++) {
              const p1 = window.chaosParticles[i];
              const p2 = window.chaosParticles[j];
              const dist = Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
              if (dist < 100) {
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', p1.x);
                line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x);
                line.setAttribute('y2', p2.y);
                line.setAttribute('stroke', '#E6FF00');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('opacity', (1 - dist / 100) * 0.4);
                svg.appendChild(line);
              }
            }
          }
        }

        // Update and draw particles
        window.chaosParticles.forEach(p => {
          p.update(centerX, centerY, collapseProgress);
          if (p.life > 0) {
            const circle = document.createElementNS(svgNS, 'circle');
            circle.setAttribute('cx', p.x);
            circle.setAttribute('cy', p.y);
            circle.setAttribute('r', p.size);
            circle.setAttribute('fill', `rgba(230, 255, 0, ${p.life * 0.8})`);
            svg.appendChild(circle);
          }
        });

        // Scale nucleus during collapse
        const nucleusSVG = document.getElementById('sf-nucleus');
        const nucleusScale = 1 + collapseProgress * 2;
        nucleusSVG.style.transform = `translate(-50%, -50%) scale(${nucleusScale})`;
        nucleusSVG.style.opacity = 1 - collapseProgress * 0.5;

        // After collapse, show Level 1 nodes delay
        if (elapsed > 4) {
          if (!window.nucleusExpanded) {
            expandNucleus();
            canvas.style.opacity = '0.1';
          }
          cancelAnimationFrame(animationId);
          return;
        }

        animationId = requestAnimationFrame(animateChaos);
      }

      animateChaos();
    }

    // ===== 3D SPHERE (Mobile Three.js) =====
    function initChaos3D() {
      const canvas = document.getElementById('sf-canvas-3d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      renderer.setClearColor(0x030305, 1);

      camera.position.z = 3;

      // Wireframe sphere
      const geometry = new THREE.IcosahedronGeometry(1.5, 4);
      const material = new THREE.MeshPhongMaterial({
        color: 0xE6FF00,
        emissive: 0x330066,
        wireframe: true,
        transparent: true,
        opacity: 0.5
      });
      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      // Particle lights
      const particleGeometry = new THREE.BufferGeometry();
      const particleCount = 100;
      const positions = new Float32Array(particleCount * 3);
      for (let i = 0; i < particleCount * 3; i += 3) {
        positions[i] = (Math.random() - 0.5) * 5;
        positions[i + 1] = (Math.random() - 0.5) * 5;
        positions[i + 2] = (Math.random() - 0.5) * 5;
      }
      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const particleMaterial = new THREE.PointsMaterial({
        color: 0xE6FF00,
        size: 0.05,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.7
      });
      const particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);

      // Lighting
      const light = new THREE.PointLight(0xE6FF00, 1);
      light.position.set(5, 5, 5);
      scene.add(light);

      let chaosStart = Date.now();
      let collapsing = false;

      function animate() {
        requestAnimationFrame(animate);

        const elapsed = (Date.now() - chaosStart) / 1000;
        const collapseProgress = Math.max(0, Math.min(1, (elapsed - 2.5) / 1.5));

        if (elapsed > 2.5 && !collapsing) {
          collapsing = true;
        }

        // Rotate sphere
        sphere.rotation.x += 0.002;
        sphere.rotation.y += 0.003;

        // Scale sphere during collapse
        sphere.scale.set(1 + collapseProgress * 0.5, 1 + collapseProgress * 0.5, 1 + collapseProgress * 0.5);

        // Fade particles during col lapse
        particleMaterial.opacity = 0.7 - collapseProgress * 0.5;

        // Fade canvas
        const target = collapsing ? 0 : 0.1;
        canvas.style.opacity = Math.max(canvas.style.opacity || target, target - collapseProgress * 0.1);

        if (elapsed > 4 && !window.nucleusExpanded) {
          expandNucleus();
          canvas.style.opacity = '0.1';
        }

        renderer.render(scene, camera);
      }

      animate();

      // Handle resize
      window.addEventListener('resize', () => {
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      });
    }

    // ===== EXPAND NUCLEUS (Show Level 1 Nodes) =====
    function expandNucleus() {
      if (window.nucleusExpanded) return;
      window.nucleusExpanded = true;

      const nucleusSVG = document.getElementById('sf-nucleus');
      const label = document.getElementById('sf-nucleus-label');

      nucleusSVG.style.opacity = '1';
      label.textContent = '[NUCLEUS] — EXPANDED';

      if (!window.navTree || !window.navTree.nucleus) {
        setTimeout(expandNucleus, 100);
        return;
      }

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      const level1Keys = Object.keys(window.navTree.nucleus.children || {});
      if (level1Keys.length === 0) return;

      // Desktop: to the right; Mobile: upward
      const isVertical = isMobile;
      const radius = 200;
      const angleOffset = isMobile ? -Math.PI / 2 : 0;

      // Create SVG overlay for Level 1 nodes
      const canvasContainer = document.getElementById('sf-canvas-2d');
      if (!canvasContainer.querySelector('svg.level1')) {
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'level1');
        svg.setAttribute('width', window.innerWidth);
        svg.setAttribute('height', window.innerHeight);
        svg.setAttribute('style', 'position:absolute;top:0;left:0;z-index:5;pointer-events:all;');
        canvasContainer.appendChild(svg);

        level1Keys.forEach((key, idx) => {
          const angle = angleOffset + (idx * (2 * Math.PI) / level1Keys.length);
          const x = centerX + radius * Math.cos(angle);
          const y = centerY + radius * Math.sin(angle);

          // Line to nucleus
          const line = document.createElementNS(svgNS, 'line');
          line.setAttribute('x1', centerX);
          line.setAttribute('y1', centerY);
          line.setAttribute('x2', x);
          line.setAttribute('y2', y);
          line.setAttribute('stroke', '#E6FF00');
          line.setAttribute('stroke-width', '1.5');
          line.setAttribute('opacity', '0.6');
          svg.appendChild(line);

          // Node circle
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('cx', x);
          circle.setAttribute('cy', y);
          circle.setAttribute('r', '12');
          circle.setAttribute('fill', '#E6FF00');
          circle.setAttribute('stroke', '#fff');
          circle.setAttribute('stroke-width', '1.5');
          circle.setAttribute('cursor', 'pointer');
          circle.setAttribute('data-node', key);
          circle.style.transition = 'filter 0.15s';
          circle.addEventListener('mouseenter', () => {
            circle.style.filter = 'drop-shadow(0 0 12px #E6FF00)';
          });
          circle.addEventListener('mouseleave', () => {
            circle.style.filter = 'none';
          });
          circle.addEventListener('click', () => {
            if (window.router && window.router.navigateFractal) {
              window.router.navigateFractal(key);
            }
          });
          svg.appendChild(circle);

          // Label
          const text = document.createElementNS(svgNS, 'text');
          text.setAttribute('x', x);
          text.setAttribute('y', y);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('dy', '.35em');
          text.setAttribute('font-size', '10px');
          text.setAttribute('fill', '#030305');
          text.setAttribute('font-weight', 'bold');
          text.setAttribute('pointer-events', 'none');
          text.textContent = key.substring(0, 2).toUpperCase();
          svg.appendChild(text);
        });
      }
    }

    // ===== NUCLEUS CLICK HANDLER =====
    document.getElementById('sf-nucleus').addEventListener('click', expandNucleus);

    // ===== CLOSE BUTTON =====
    document.getElementById('sf-close-btn').addEventListener('click', () => {
      document.getElementById('sf-main-stage').classList.remove('loaded');
      document.getElementById('sf-content').innerHTML = '';
      if (window.router) {
        window.currentNavigationPath = ['nucleus'];
      }
    });

    // ===== INIT SEQUENCE =====
    window.addEventListener('DOMContentLoaded', () => {
      // Start chaos animation
      if (isMobile) {
        setTimeout(initChaos3D, 50);
      } else {
        setTimeout(initChaos2D, 50);
      }

      console.log('%c[SF] — NEURO-GESTALT ACTIVATED —', 'color: #E6FF00; font-weight: bold; font-size: 14px;');
    });
  </script>
</body>
</html>
