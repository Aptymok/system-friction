<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System Friction Institute</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #050510;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Panels */
        .ui-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .ui-container > * {
            pointer-events: auto;
        }

        #header {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            text-align: right;
            font-size: 10px;
            letter-spacing: 2px;
            color: #aaa;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid #222;
        }

        #reflection-panel {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 380px;
            height: calc(100vh - 40px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #C8A951;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #222;
            font-size: 11px;
            color: #E6FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #bios-display {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            font-size: 9px;
            color: #666;
            line-height: 1.5;
        }

        .bios-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .bios-label {
            color: #666;
        }

        .bios-value {
            color: #C8A951;
            font-weight: 600;
        }

        #conversation-history {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .conversation-entry {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .timestamp {
            font-size: 8px;
            color: #444;
        }

        .user-reflection {
            background: #0a0a0a;
            border: 1px solid #222;
            border-left: 2px solid #C8A951;
            padding: 8px;
            font-size: 10px;
            color: #aaa;
        }

        .seer-analysis {
            background: #0a0a0a;
            border: 1px solid #222;
            border-left: 2px solid #E6FF00;
            padding: 8px;
            font-size: 9px;
            color: #888;
        }

        .metrics-display {
            font-size: 8px;
            color: #666;
            padding-top: 4px;
            border-top: 1px solid #1a1a1a;
            margin-top: 4px;
        }

        #reflection-input-area {
            padding: 12px;
            border-top: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #reflection-textarea {
            width: 100%;
            padding: 8px;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            resize: none;
            height: 60px;
        }

        #reflect-button {
            padding: 8px;
            background: #E6FF00;
            color: #000;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
        }

        #reflect-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #metrics-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 280px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #C8A951;
            border-radius: 8px;
            padding: 16px;
            font-size: 10px;
            color: #aaa;
        }

        .metric-box {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #222;
        }

        .metric-title {
            font-size: 9px;
            color: #E6FF00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            padding: 3px 0;
        }

        .metric-label {
            color: #666;
        }

        .metric-value {
            color: #C8A951;
            font-weight: 600;
        }

        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 8px;
            color: #666;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 8px;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay.hidden {
            display: none;
        }

        .config-card {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #C8A951;
            border-radius: 8px;
        }

        .config-card h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .config-card p {
            font-size: 11px;
            color: #888;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 10px;
            color: #C8A951;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 10px;
            border-radius: 2px;
        }

        button {
            padding: 10px 20px;
            background: #E6FF00;
            color: #000;
            border: none;
            font-family: monospace;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 12px;
        }

        @media (max-width: 900px) {
            #reflection-panel { width: 300px; }
            #metrics-panel { width: 240px; }
        }
    </style>
</head>
<body>

    <!-- Overlay Inicial: API Key y Configuración -->
    <div id="config-overlay" class="overlay">
        <div class="config-card">
            <h1>System Friction</h1>
            <p>Inicialización del Seer. Introduce tus claves de API (solo se guardan localmente).</p>
            <form id="api-config-form">
                <div class="form-group">
                    <label>Proveedor de IA</label>
                    <select id="provider-select">
                        <option value="anthropic">ANTHROPIC (Claude) · Modelo más chingón</option>
                        <option value="groq">GROQ (Mixtral / Llama) · Alternativa rápida</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="api-key-input" placeholder="sk-ant-api... o gsk_..." required>
                </div>
                <div class="form-group">
                    <label>URL de API (Opcional, por defecto usa la oficial)</label>
                    <input type="text" id="api-url-input" placeholder="https://api.anthropic.com/v1/messages">
                </div>
                <button type="submit">Conectar y Continuar</button>
            </form>
        </div>
    </div>

    <!-- Overlay de BIOS del Usuario -->
    <div id="bios-overlay" class="overlay hidden">
        <div class="config-card">
            <h1>BIOS · Inicialización</h1>
            <p>¿Quién observa?</p>
            <form id="bios-form">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="name" placeholder="Tu nombre o alias" required>
                </div>
                <div class="form-group">
                    <label>Rol / Función</label>
                    <input type="text" name="role" placeholder="Tu rol en este sistema" required>
                </div>
                <div class="form-group">
                    <label>Foco actual</label>
                    <input type="text" name="focus" placeholder="Área de atención" required>
                </div>
                <div class="form-group">
                    <label>Contexto (opcional)</label>
                    <textarea name="context" placeholder="Restricciones, oportunidades, etc."></textarea>
                </div>
                <button type="submit">Iniciar</button>
            </form>
        </div>
    </div>

    <!-- UI Principal -->
    <div class="ui-container">
        <div id="header">⚡ <strong>SEER · YOD</strong> · ATRACTOR</div>

        <div id="reflection-panel">
            <div class="panel-header">Reflexiones</div>
            <div id="bios-display"></div>
            <div id="conversation-history"></div>
            <div id="reflection-input-area">
                <textarea id="reflection-textarea" placeholder="Tu reflexión. El Seer observará."></textarea>
                <button id="reflect-button">Reflejar</button>
            </div>
        </div>

        <div id="metrics-panel">
            <div class="metric-box"><div class="metric-title">Estado</div><div id="state-metrics"></div></div>
            <div class="metric-box"><div class="metric-title">Convergencia</div><div id="convergence-metrics"></div></div>
            <div class="metric-box"><div class="metric-title">Observación</div><div id="observation-metrics"></div></div>
        </div>

        <div id="info-panel">◈ YOD · MICROMOMENTO · MERCURIO · ATRACTOR ◈</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ====== CONFIGURACIÓN INICIAL ======
        let apiConfig = {
            provider: 'anthropic',
            apiKey: null,
            apiUrl: 'https://api.anthropic.com/v1/messages'
        };
        let userBios = null;
        let conversations = [];
        let currentMetrics = { ihg: 0.5, nti: 70, phi: 10, ldi: 1.5 };
        let yodState = { scale: 1, complexity: 1, energy: 0 };
        let seerEnabled = false;

        // Modelos disponibles (solo el mejor activo por defecto, otros comentados)
        // PROVEEDOR ANTHROPIC (Claude) — Modelo más chingón para análisis
        // Otros modelos de Anthropic: claude-3-haiku, claude-3-sonnet, etc.
        // PROVEEDOR GROQ (Modelos rápidos y eficientes)
        // Modelos GROQ disponibles: mixtral-8x7b-32768, llama3-70b-8192, gemma2-9b-it, etc.

        async function callLLM(prompt) {
            if (!seerEnabled) throw new Error('API no configurada');
            const body = {
                model: "claude-3-7-sonnet-20250219",  // El más chingón actual (Anthropic)
                max_tokens: 300,
                system: prompt,
                messages: [{ role: "user", content: "Analiza la reflexión según el contexto." }]
            };
            // Si usas GROQ (alternativa), cambia la URL y el body. Código comentado listo.
            if (apiConfig.provider === 'groq') {
                // body.model = "mixtral-8x7b-32768";
                // Llamada a API de Groq (https://api.groq.com/openai/v1/chat/completions)
            }
            const response = await fetch(apiConfig.apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiConfig.apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify(body)
            });
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            const data = await response.json();
            return data.content[0].text;
        }

        // DOM Elements
        const configOverlay = document.getElementById('config-overlay');
        const biosOverlay = document.getElementById('bios-overlay');
        const apiForm = document.getElementById('api-config-form');
        const biosForm = document.getElementById('bios-form');
        const reflectBtn = document.getElementById('reflect-button');
        const textarea = document.getElementById('reflection-textarea');

        // Cargar configuración guardada
        function loadConfig() {
            const stored = localStorage.getItem('sf_api_config');
            if (stored) {
                apiConfig = JSON.parse(stored);
                if (apiConfig.apiKey) {
                    seerEnabled = true;
                    configOverlay.classList.add('hidden');
                    loadUserData();
                } else {
                    configOverlay.classList.remove('hidden');
                }
            }
        }

        apiForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const provider = document.getElementById('provider-select').value;
            const apiKey = document.getElementById('api-key-input').value.trim();
            let apiUrl = document.getElementById('api-url-input').value.trim();
            if (!apiUrl) {
                apiUrl = provider === 'anthropic' ? 'https://api.anthropic.com/v1/messages' : 'https://api.groq.com/openai/v1/chat/completions';
            }
            apiConfig = { provider, apiKey, apiUrl };
            localStorage.setItem('sf_api_config', JSON.stringify(apiConfig));
            seerEnabled = true;
            configOverlay.classList.add('hidden');
            loadUserData();
        });

        function loadUserData() {
            const stored = localStorage.getItem('sf-user-bios');
            if (stored) {
                userBios = JSON.parse(stored);
                const convStored = localStorage.getItem('sf-conversations');
                if (convStored) conversations = JSON.parse(convStored);
                biosOverlay.classList.add('hidden');
                initApp();
            } else {
                biosOverlay.classList.remove('hidden');
            }
        }

        biosForm.addEventListener('submit', (e) => {
            e.preventDefault();
            userBios = {
                name: biosForm.querySelector('input[name="name"]').value,
                role: biosForm.querySelector('input[name="role"]').value,
                focus: biosForm.querySelector('input[name="focus"]').value,
                context: biosForm.querySelector('textarea[name="context"]').value,
                timestamp: new Date().toISOString(),
            };
            localStorage.setItem('sf-user-bios', JSON.stringify(userBios));
            biosOverlay.classList.add('hidden');
            initApp();
        });

        function initApp() {
            updateUIBios();
            renderConversations();
            updateMetricsPanel();
            initThreeJS();
            reflectBtn.disabled = false;
            reflectBtn.onclick = reflectWithSeer;
        }

        function updateUIBios() {
            const biosDiv = document.getElementById('bios-display');
            biosDiv.innerHTML = `
                <div class="bios-item"><span class="bios-label">Nombre</span><span class="bios-value">${userBios.name}</span></div>
                <div class="bios-item"><span class="bios-label">Rol</span><span class="bios-value">${userBios.role}</span></div>
                <div class="bios-item"><span class="bios-label">Foco</span><span class="bios-value">${userBios.focus}</span></div>
                <div class="bios-item"><span class="bios-label">Reflexiones</span><span class="bios-value">${conversations.length}</span></div>
            `;
        }

        function renderConversations() {
            const container = document.getElementById('conversation-history');
            container.innerHTML = conversations.map(conv => `
                <div class="conversation-entry">
                    <div class="timestamp">${new Date(conv.timestamp).toLocaleTimeString()}</div>
                    <div class="user-reflection">${escapeHtml(conv.userInput)}</div>
                    ${conv.seerAnalysis ? `
                        <div class="seer-analysis">
                            ${escapeHtml(conv.seerAnalysis)}
                            <div class="metrics-display">IHG: ${conv.metrics.ihg.toFixed(2)} | NTI: ${conv.metrics.nti.toFixed(0)}% | Φ(t): ${conv.metrics.phi.toFixed(1)}</div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function reflectWithSeer() {
            const text = textarea.value.trim();
            if (!text) return;
            reflectBtn.disabled = true;
            reflectBtn.textContent = 'ANALIZANDO...';
            const newConv = {
                timestamp: new Date().toISOString(),
                userInput: text,
                seerAnalysis: null,
                metrics: { ihg: 0.5, nti: 70, phi: 10, ldi: 1.5 }
            };
            if (seerEnabled) {
                try {
                    const systemPrompt = `Eres el Seer del Sistema de Fricción. BIOS: ${userBios.name} (${userBios.role}) · Foco: ${userBios.focus}
Analiza en máximo 100 palabras:
[PATRÓN] observado
[IHG] estima fricción (0-1)
[PREDICCIÓN] tendencia
Tono clínico, quirúrgico.`;
                    const analysis = await callLLM(systemPrompt);
                    newConv.seerAnalysis = analysis;
                    const ihgMatch = analysis.match(/IHG[:\s]*([0-9.]+)/i);
                    if (ihgMatch) newConv.metrics.ihg = Math.min(1, Math.max(0, parseFloat(ihgMatch[1])));
                    newConv.metrics.nti = 50 + Math.random() * 40;
                    newConv.metrics.phi = 5 + Math.random() * 15;
                } catch (err) {
                    newConv.seerAnalysis = `Error: ${err.message}`;
                }
            } else {
                newConv.seerAnalysis = `[SEER INACTIVO] Configura API Key.`;
            }
            conversations.push(newConv);
            localStorage.setItem('sf-conversations', JSON.stringify(conversations));
            textarea.value = '';
            renderConversations();
            updateMetricsPanel();
            updateYODFromMetrics();
            reflectBtn.disabled = false;
            reflectBtn.textContent = 'REFLEJAR';
        }

        function updateMetricsPanel() {
            if (!conversations.length) return;
            const recent = conversations.slice(-5);
            const avgIhg = recent.reduce((s,c) => s + (c.metrics?.ihg || 0),0)/recent.length;
            const avgNti = recent.reduce((s,c) => s + (c.metrics?.nti || 0),0)/recent.length;
            const avgPhi = recent.reduce((s,c) => s + (c.metrics?.phi || 0),0)/recent.length;
            document.getElementById('state-metrics').innerHTML = `<div class="metric-row"><span class="metric-label">IHG</span><span class="metric-value">${avgIhg.toFixed(2)}</span></div>
            <div class="metric-row"><span class="metric-label">NTI</span><span class="metric-value">${avgNti.toFixed(0)}%</span></div>`;
            const trend = recent.length >=2 ? (recent[recent.length-2].metrics?.ihg||0) - (recent[recent.length-1].metrics?.ihg||0) : 0;
            document.getElementById('convergence-metrics').innerHTML = `<div class="metric-row"><span class="metric-label">Tendencia</span><span class="metric-value">${trend>0?'↓ Conv.':'↑ Div.'}</span></div>
            <div class="metric-row"><span class="metric-label">Φ(t)</span><span class="metric-value">${avgPhi.toFixed(1)}</span></div>`;
            document.getElementById('observation-metrics').innerHTML = `<div class="metric-row"><span class="metric-label">Complejidad</span><span class="metric-value">${yodState.complexity.toFixed(2)}</span></div>
            <div class="metric-row"><span class="metric-label">Energía</span><span class="metric-value">${(yodState.energy*100).toFixed(0)}%</span></div>`;
        }

        // THREE.JS YOD ATTRACTOR
        let scene, camera, renderer, effectComposer, yodElements = {};
        function initThreeJS() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x050510); scene.fog = new THREE.FogExp2(0x050510, 0.008);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000); camera.position.set(5,3,8);
            renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2,0.3,0.85);
            effectComposer = new EffectComposer(renderer); effectComposer.addPass(renderScene); effectComposer.addPass(bloomPass);
            const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.autoRotate = true; controls.autoRotateSpeed = 0.6;
            const ambient = new THREE.AmbientLight(0x222222); scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xffcc88,1.2); mainLight.position.set(2,5,3); scene.add(mainLight);
            const backLight = new THREE.PointLight(0x6688ff,0.6); backLight.position.set(-2,1,-4); scene.add(backLight);
            const coreMat = new THREE.MeshStandardMaterial({ color:0xC8A951, emissive:0x442200, emissiveIntensity:0.9 });
            yodElements.core = new THREE.Mesh(new THREE.SphereGeometry(0.42,64,64), coreMat); scene.add(yodElements.core);
            const ringMat = new THREE.MeshStandardMaterial({ color:0xE6FF00, emissive:0x88aa00 });
            yodElements.ring = new THREE.Mesh(new THREE.TorusGeometry(0.82,0.05,64,200), ringMat); scene.add(yodElements.ring);
            const knotMat = new THREE.MeshStandardMaterial({ color:0x88aaff, emissive:0x2266aa });
            yodElements.knot = new THREE.Mesh(new THREE.TorusKnotGeometry(1.4,0.12,180,24,3,4), knotMat); scene.add(yodElements.knot);
            const icoMat = new THREE.MeshBasicMaterial({ color:0x88ccff, wireframe:true, transparent:true, opacity:0.2 });
            yodElements.ico = new THREE.Mesh(new THREE.IcosahedronGeometry(1.85,0), icoMat); scene.add(yodElements.ico);
            const particleCount=2800, particlesGeo=new THREE.BufferGeometry(), pos=[];
            for(let i=0;i<particleCount;i++){ let r=3.2+Math.random()*2.2, theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
                pos.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta)*0.9, r*Math.cos(phi));}
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos),3));
            yodElements.particles = new THREE.Points(particlesGeo, new THREE.PointsMaterial({color:0x77aaff, size:0.045, blending:THREE.AdditiveBlending}));
            scene.add(yodElements.particles);
            const lPoints=[]; for(let i=0;i<=120;i++){ let t=i/120, angle=t*Math.PI*3.8, rad=2.1+Math.sin(angle*2)*0.4;
                lPoints.push(new THREE.Vector3(Math.cos(angle+0.5)*rad, Math.sin(angle*2.2)*0.9, Math.sin(angle*1.3)*rad));}
            const lineGeo = new THREE.BufferGeometry().setFromPoints(lPoints);
            yodElements.mercurialLine = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({color:0xE6FF00}));
            scene.add(yodElements.mercurialLine);
            let time=0;
            function animate(){
                requestAnimationFrame(animate); time+=0.012;
                yodElements.knot.rotation.x = time*0.2*yodState.complexity;
                yodElements.knot.rotation.y = time*0.35*yodState.complexity;
                yodElements.ring.rotation.z = time*0.5;
                yodElements.ring.rotation.x = Math.sin(time*0.4)*0.3;
                yodElements.ico.rotation.y = time*0.08*yodState.complexity;
                yodElements.particles.rotation.y = time*0.03;
                const pulse = 1+Math.sin(time*5)*0.03*yodState.energy;
                yodElements.core.scale.set(pulse,pulse,pulse);
                if(yodElements.mercurialLine.geometry.attributes.position){
                    const attr = yodElements.mercurialLine.geometry.attributes.position.array;
                    for(let i=0;i<=120;i++){ let t=i/120, angle=t*Math.PI*3.8+time*1.2*yodState.complexity, def=currentMetrics.ihg*0.5, rad=2.1+Math.sin(angle*2)*(0.4+def);
                        attr[i*3]=Math.cos(angle+0.5)*rad; attr[i*3+2]=Math.sin(angle*1.3+time*0.5)*rad; attr[i*3+1]=Math.sin(angle*2.2+time*0.8)*0.95;}
                    yodElements.mercurialLine.geometry.attributes.position.needsUpdate = true;
                }
                controls.update(); effectComposer.render();
            } animate();
            window.addEventListener('resize',()=>{ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); effectComposer.setSize(window.innerWidth,window.innerHeight); renderer.setSize(window.innerWidth,window.innerHeight); });
        }
        function updateYODFromMetrics(){
            if(!conversations.length) return;
            const recent = conversations.slice(-3);
            const avgIhg = recent.reduce((s,c)=>s+(c.metrics?.ihg||0),0)/recent.length;
            const avgNti = recent.reduce((s,c)=>s+(c.metrics?.nti||0),0)/recent.length;
            yodState.complexity = 1+(1-avgIhg);
            yodState.energy = avgNti/100;
            if(yodElements.core) yodElements.core.material.emissiveIntensity = 0.5+yodState.energy*0.5;
            if(yodElements.ring) yodElements.ring.material.emissiveIntensity = 0.3+yodState.energy*0.4;
            updateMetricsPanel();
        }
        function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m;});}
        loadConfig();
    </script>
