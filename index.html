<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Friction OS — Neuro-Gestalt</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root { --neon: #E6FF00; --void: #030305; --gold: #FFD700; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--void); color: var(--neon);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
    }

    /* ===== CAPAS DE RENDERIZADO ===== */
    #bg-layer {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    #sf-canvas-3d, #sf-canvas-2d {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.15; /* Opacidad base del mapa de fondo */
    }

    /* ===== NÚCLEO Y CONTROL ===== */
    #sf-nucleus-wrapper {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50; cursor: pointer;
      text-align: center; pointer-events: auto;
    }

    #sf-nucleus {
      width: 50px; height: 50px;
      background: var(--gold);
      border: 2px solid var(--neon);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(230, 255, 0, 0.5);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #sf-nucleus:hover { transform: scale(1.2); filter: brightness(1.2); }
    #sf-nucleus.active { background: var(--neon); box-shadow: 0 0 40px var(--neon); }

    #sf-nucleus-label {
      margin-top: 15px; font-size: 10px; letter-spacing: 2px;
      opacity: 0.5; text-transform: uppercase;
    }

    /* ===== ESCENARIO DE CONTENIDO (DASHBOARD) ===== */
    #sf-main-stage {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100; opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      background: rgba(3, 3, 5, 0.94); /* Casi opaco para legibilidad */
      overflow-y: auto;
    }

    #sf-main-stage.loaded { opacity: 1; pointer-events: auto; }

    .sf-content-wrapper {
      max-width: 900px; margin: 80px auto; padding: 20px;
    }

    #sf-close-btn {
      position: fixed; top: 25px; right: 25px;
      background: transparent; border: 1px solid var(--neon);
      color: var(--neon); padding: 8px 15px; cursor: pointer;
      font-family: inherit; font-size: 11px; z-index: 101;
    }

    /* Estilos del Atlas inyectado */
    .header-tag { color: var(--gold); font-size: 12px; margin-bottom: 20px; border-bottom: 1px solid rgba(230,255,0,0.2); padding-bottom: 10px; }
  </style>
</head>
<body class="desktop">

  <div id="bg-layer">
    <canvas id="sf-canvas-3d"></canvas>
    <div id="sf-canvas-2d"></div>
  </div>

  <div id="sf-nucleus-wrapper" onclick="handleNucleusClick()">
    <div id="sf-nucleus"></div>
    <div id="sf-nucleus-label">INITIALIZING...</div>
  </div>

  <div id="sf-main-stage">
    <button id="sf-close-btn" onclick="closeStage()">[CLOSE]</button>
    <div class="sf-content-wrapper" id="sf-content"></div>
  </div>

  <script src="/js/state.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/core.js"></script>

  <script>
    // Configuración de Dispositivo
    const isMobile = window.innerWidth < 768;
    document.body.className = isMobile ? 'mobile' : 'desktop';

    let particles = [];
    let collapsing = false;
    let systemReady = false;

    // ===== 2D CAOS (Neuro-Gestalt) =====
    const canvas2d = document.createElement('canvas');
    const ctx2d = canvas2d.getContext('2d');
    document.getElementById('sf-canvas-2d').appendChild(canvas2d);

    function resize() {
      canvas2d.width = window.innerWidth;
      canvas2d.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Crear partículas de caos inicial
    for(let i=0; i<120; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 12,
        vy: (Math.random() - 0.5) * 12,
        size: Math.random() * 2 + 1
      });
    }

    function animateIntro() {
      if (systemReady && !collapsing) return;
      
      ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      particles.forEach(p => {
        if (collapsing) {
          // Colapso: Atracción magnética al centro
          p.vx = (centerX - p.x) * 0.15;
          p.vy = (centerY - p.y) * 0.15;
          p.size *= 0.98; // Se desvanecen al entrar al núcleo
        } else {
          // Caos: Rebote en bordes
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > canvas2d.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas2d.height) p.vy *= -1;
        }

        ctx2d.fillStyle = '#E6FF00';
        ctx2d.beginPath();
        ctx2d.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx2d.fill();
      });

      if (!systemReady) requestAnimationFrame(animateIntro);
    }

    // Iniciar Animación de Caos
    animateIntro();

    // Temporizador Neuro-Gestalt (2.5s Caos -> Colapso)
    setTimeout(() => {
      collapsing = true;
      document.getElementById('sf-nucleus-label').textContent = 'COLLAPSING...';
      
      setTimeout(() => {
        systemReady = true;
        collapsing = false;
        ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
        document.getElementById('sf-nucleus-label').textContent = '[NUCLEUS] STABLE';
        document.getElementById('sf-nucleus').classList.add('active');
        
        // Iniciar Mapa Esférico si es Mobile
        if (isMobile) init3DSphere();
      }, 1500);
    }, 2500);

    // ===== THREE.JS SPHERE (Mapa de fondo) =====
    function init3DSphere() {
      const canvas3d = document.getElementById('sf-canvas-3d');
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);

      const geo = new THREE.IcosahedronGeometry(2, 2);
      const mat = new THREE.MeshBasicMaterial({ color: 0xE6FF00, wireframe: true, transparent: true, opacity: 0.3 });
      const sphere = new THREE.Mesh(geo, mat);
      scene.add(sphere);
      camera.position.z = 5;

      function rotate() {
        requestAnimationFrame(rotate);
        sphere.rotation.y += 0.005;
        renderer.render(scene, camera);
      }
      rotate();
    }

    // ===== LÓGICA DE INTERACCIÓN =====
    function handleNucleusClick() {
      if (!systemReady) return;
      const label = document.getElementById('sf-nucleus-label');
      
      if (!window.nucleusExpanded) {
        label.textContent = '[SYSTEM] EXPANDED';
        // Aquí llamas a tu función en core.js que dibuja los nodos Level 1
        if (window.expandNucleus) window.expandNucleus();
        window.nucleusExpanded = true;
      } else {
        // Si ya está expandido, quizás quieras volver al centro
        label.textContent = '[NUCLEUS] STABLE';
        window.nucleusExpanded = false;
      }
    }

    function closeStage() {
      document.getElementById('sf-main-stage').classList.remove('loaded');
      document.getElementById('sf-content').innerHTML = '';
    }

    console.log('%c[SF-OS] — SISTEMA INICIADO —', 'color: #E6FF00; font-weight: bold;');
  </script>
</body>
</html>
