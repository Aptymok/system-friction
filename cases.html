<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Friction · Observatorio de Casos</title>
  <link rel="stylesheet" href="style.css">
<style>
  body {
  margin: 0;
  background: #0a0a09;
  color: #c4c0b5;
  font-family: Arial, sans-serif;
}

.app {
  max-width: 1100px;
  margin: auto;
}

.top {
  display: flex;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid #1e1e1e;
}

.brand {
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  color: #c8a951;
}

.module {
  font-size: 0.7rem;
  color: #777;
}

.bloque {
  padding: 1.5rem;
}

.bloque-titulo {
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 1rem;
}

.carousel {
  display: none;
  gap: 1rem;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
}

.carousel::-webkit-scrollbar {
  display: none;
}

.carousel.active {
  display: flex;
}

.card {
  min-width: 320px;
  background: #101010;
  border: 1px solid #222;
  padding: 1.2rem;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
}

.case-id {
  font-size: 0.6rem;
  color: #c8a951;
  letter-spacing: 0.1em;
}

.case-title {
  font-size: 1.1rem;
  margin: 0.5rem 0;
}

.case-desc {
  font-size: 0.75rem;
  color: #888;
  line-height: 1.5;
}

.stages {
  display: flex;
  gap: 2px;
  margin-top: 1rem;
  overflow-x: auto;
  scrollbar-width: none;
}

.stages::-webkit-scrollbar {
  display: none;
}

.stage {
  min-width: 200px;
  background: #161616;
  border: 1px solid #2a2a25;
  padding: 0.75rem;
}

.stage-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: #c8a951;
  margin-bottom: 0.3rem;
}

.stage-body {
  font-size: 0.75rem;
  color: #aaa;
}

.action {
  margin-top: auto;
  margin-top: 1rem;
  font-size: 0.7rem;
  color: #c8a951;
  cursor: pointer;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-box {
  background: #111;
  padding: 2rem;
  max-width: 520px;
  border: 1px solid #333;
}

.close {
  background: none;
  border: none;
  color: #777;
  float: right;
  cursor: pointer;
}
  
</style>
</head>
<body>

<div class="app">

  <header class="top">
    <div class="brand">System Friction</div>
    <div class="module">Observatorio · Casos</div>
  </header>

  <section class="bloque">
    <div class="bloque-titulo" onclick="toggle('operativas')">
      Conclusiones operativas
    </div>
    <div class="carousel" id="operativas"></div>
  </section>

</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <button class="close" onclick="closeModal()">X</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
