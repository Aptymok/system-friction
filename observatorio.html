<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SF Observatory · Campo Cognitivo · Sistema Completo</title>
<style>
body { margin:0; font-family: monospace; background:#111; color:#eee; overflow:hidden; }
#menu { position: fixed; top:0; left:0; right:0; height:40px; background:#222; display:flex; align-items:center; padding:0 10px; z-index:10; font-size:12px; }
#menu button { margin-right:5px; padding:4px 8px; background:#333; border:none; color:#eee; cursor:pointer; }
#menu button:hover { background:#555; }
#mihm-live { margin-left:auto; margin-right:10px; background:#333; padding:4px 8px; border-radius:2px; }
#canvas-container { width:100vw; height:100vh; }
.tooltip { position:absolute; background:#222; color:#eee; padding:4px 6px; font-size:11px; border-radius:3px; pointer-events:none; z-index:20; display:none; max-width:250px; }
</style>
</head>
<body>

<div id="menu">
<button id="btnIA">GENERAR CON IA</button>
<button data-pattern="orbe">PATRÓN · ORBE</button>
<button data-pattern="cluster">PATRÓN · CLÚSTER</button>
<button data-pattern="capas">PATRÓN · CAPAS</button>
<button data-pattern="grid">PATRÓN · GRID</button>
<button id="centerView">CENTRAR VISTA</button>
<div id="mihm-live">MIHM · LIVE | IHG 0.21 ICE 0.73 CRM 0.18 NTI 0.44 Ψᵢ 1.42</div>
</div>

<div id="canvas-container">
<canvas id="sfCanvas"></canvas>
<div class="tooltip" id="tooltip"></div>
</div>

<script src="DOCS_COMPLETOS.JS"></script>
<script src="SystemFrictionNodes.json"></script>

<script>
// Variables globales
const canvas = document.getElementById('sfCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = SystemFrictionNodes.nodes || [];
let documents = DOCS_COMPLETOS || {};
let patternType = 'orbe';
let center = { x: canvas.width/2, y: canvas.height/2 };
let tooltip = document.getElementById('tooltip');
let mihmMetrics = {IHG:0.21, ICE:0.73, CRM:0.18, NTI:0.44, PSI:1.42};

// Asignar formas y colores según tipo de documento
const shapes = { doc:'hexagon', report:'square', note:'triangle', other:'circle' };
const colors = { doc:'#FF5722', report:'#03A9F4', note:'#CDDC39', other:'#9C27B0' };

// Eventos de menú
document.querySelectorAll('#menu button[data-pattern]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ patternType = btn.dataset.pattern; arrangeNodes(); });
});
document.getElementById('centerView').addEventListener('click', ()=>{ center = {x:canvas.width/2, y:canvas.height/2}; arrangeNodes(); });

// IA button
document.getElementById('btnIA').addEventListener('click', async ()=>{
    const query = prompt("Pregunta al sistema:"); 
    if(query){ 
        let response = await generateIAResponse(query);
        alert(response);
    }
});

// Función IA (simulada, basada en System Friction)
async function generateIAResponse(query){
    // Responde con patrones y métricas simples según nodos y docs
    let activeNodes = nodes.length;
    let activeDocs = Object.keys(documents).length;
    return `System Friction Report: ${activeNodes} nodos activos, ${activeDocs} documentos. Evaluación rápida para "${query}" completa.`;
}

// Función para dibujar formas
function drawShape(x,y,size,shape,color){
    ctx.fillStyle = color;
    ctx.beginPath();
    if(shape==='circle'){ ctx.arc(x,y,size,0,2*Math.PI); }
    else if(shape==='square'){ ctx.rect(x-size,y-size,size*2,size*2); }
    else if(shape==='triangle'){ ctx.moveTo(x,y-size); ctx.lineTo(x-size,y+size); ctx.lineTo(x+size,y+size); ctx.closePath(); }
    else if(shape==='hexagon'){ 
        for(let i=0;i<6;i++){
            let angle = Math.PI/3*i - Math.PI/6;
            let px = x + size*Math.cos(angle);
            let py = y + size*Math.sin(angle);
            if(i===0) ctx.moveTo(px,py);
            else ctx.lineTo(px,py);
        }
        ctx.closePath();
    }
    ctx.fill();
}

// Distribución de nodos según patrón
function arrangeNodes(){
    const N = nodes.length;
    let radius = Math.min(canvas.width,canvas.height)/3;
    nodes.forEach((node,i)=>{
        if(patternType==='orbe'){
            let angle = (2*Math.PI/N)*i;
            node.x = center.x + radius*Math.cos(angle);
            node.y = center.y + radius*Math.sin(angle);
        } else if(patternType==='cluster'){
            let clusterRadius = radius/2;
            node.x = center.x + (Math.random()-0.5)*clusterRadius;
            node.y = center.y + (Math.random()-0.5)*clusterRadius;
        } else if(patternType==='capas'){
            let layerSize = Math.ceil(Math.sqrt(N));
            node.x = center.x - radius + (i%layerSize)*(radius*2/layerSize);
            node.y = center.y - radius + Math.floor(i/layerSize)*(radius*2/layerSize);
        } else if(patternType==='grid'){
            let gridSize = Math.ceil(Math.sqrt(N));
            node.x = 100 + (i%gridSize)*80;
            node.y = 100 + Math.floor(i/gridSize)*80;
        }
    });
}

// Manejo de tooltip y hover
canvas.addEventListener('mousemove', (e)=>{
    let found=false;
    nodes.forEach(node=>{
        let dx = e.clientX-node.x;
        let dy = e.clientY-node.y;
        if(Math.sqrt(dx*dx+dy*dy)<20){
            tooltip.style.display='block';
            tooltip.style.left = (e.clientX+10)+'px';
            tooltip.style.top = (e.clientY+10)+'px';
            tooltip.innerHTML = `${node.id}<br>${node.title}<br>Documentos: ${node.docs?.join(', ') || 'N/A'}`;
            found=true;
        }
    });
    if(!found) tooltip.style.display='none';
});

// Doble click abre documento
canvas.addEventListener('dblclick', (e)=>{
    nodes.forEach(node=>{
        let dx = e.clientX-node.x;
        let dy = e.clientY-node.y;
        if(Math.sqrt(dx*dx+dy*dy)<20){
            let docsList = node.docs?.map(d=>documents[d]?.title).join('<br>') || 'No hay documentos';
            alert(`Nodos vinculados:\n${docsList}`);
        }
    });
});

// Actualización MIHM · LIVE
function updateMIHM(){
    // Simulación de cambios
    mihmMetrics.PSI += (Math.random()-0.5)*0.05;
    mihmMetrics.IHG += (Math.random()-0.5)*0.02;
    mihmMetrics.ICE += (Math.random()-0.5)*0.02;
    mihmMetrics.CRM += (Math.random()-0.5)*0.01;
    mihmMetrics.NTI += (Math.random()-0.5)*0.01;
    document.getElementById('mihm-live').textContent = 
        `MIHM · LIVE | IHG ${mihmMetrics.IHG.toFixed(2)} ICE ${mihmMetrics.ICE.toFixed(2)} CRM ${mihmMetrics.CRM.toFixed(2)} NTI ${mihmMetrics.NTI.toFixed(2)} Ψᵢ ${mihmMetrics.PSI.toFixed(2)}`;
}

// Loop de render
function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    nodes.forEach(node=>{
        let shape = shapes[node.type] || 'circle';
        let color = colors[node.type] || '#fff';
        drawShape(node.x,node.y,20,shape,color);
    });
    requestAnimationFrame(render);
    updateMIHM();
}

// Inicialización
arrangeNodes();
render();
</script>

</body>
</html>
