name: Apply Studio object ID patch

on:
  push:
    branches:
      - agent/fix-studio-object-id-narrowing

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-studio-object-id-narrowing
      - name: Patch nullable object ID handling
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/studio/production/StudioUnifiedIntelligence.tsx')
          text = path.read_text(encoding='utf-8')
          text = text.replace('encodeURIComponent(objectId as string)', 'encodeStudioObjectId(objectId)')
          text = text.replace('encodeURIComponent(objectId)', 'encodeStudioObjectId(objectId)')

          helper = """function encodeStudioObjectId(value: string | null) {
            if (!value) throw new Error('STUDIO_OBJECT_ID_REQUIRED');
            return encodeURIComponent(value);
          }

          """
          marker = 'function initialContext(): Context {'
          if 'function encodeStudioObjectId(' not in text:
              if marker not in text:
                  raise SystemExit('INITIAL_CONTEXT_MARKER_NOT_FOUND')
              text = text.replace(marker, helper + marker, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/studio/production/StudioUnifiedIntelligence.tsx
          git commit -m "fix(studio): narrow object ID before URL encoding"
          git push origin HEAD:agent/fix-studio-object-id-narrowing
