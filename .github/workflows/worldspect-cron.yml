name: WorldSpect Ingest Cron

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      WORLDSPECT_INGEST_SECRET: ${{ secrets.WORLDSPECT_INGEST_SECRET }}
      WORLDSPECT_API_URL: https://system-friction-hzy7jhyha-juan-antonio-marin-lieras-projects.vercel.app/api/worldspect/ingest-payload

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies if needed
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate WorldSpect payload
        run: |
          python services/python/world_cli.py > worldspect_payload.json
          cat worldspect_payload.json

      - name: Send payload to WorldSpect ingest endpoint
        run: |
          curl --fail -X POST \
            -H "Authorization: Bearer $WORLDSPECT_INGEST_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @worldspect_payload.json \
            "$WORLDSPECT_API_URL"
