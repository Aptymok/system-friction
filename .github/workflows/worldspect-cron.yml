name: WorldSpect Four Daily Measurements

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  observe_world:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve UTC Measurement Slot
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 6 ]; then
            MODE="daily_cron"
            SLOT="00"
          elif [ "$HOUR" -lt 12 ]; then
            MODE="manual"
            SLOT="06"
          elif [ "$HOUR" -lt 18 ]; then
            MODE="diagnostic"
            SLOT="12"
          else
            MODE="fallback_runtime"
            SLOT="18"
          fi
          echo "WORLDSPECT_INGEST_MODE=$MODE" >> "$GITHUB_ENV"
          echo "WORLDSPECT_MEASUREMENT_SLOT=$SLOT" >> "$GITHUB_ENV"
          echo "WorldSpect slot=$SLOT mode=$MODE"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ingestion Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f services/python/cognitive_twin/requirements.txt ]; then
            pip install -r services/python/cognitive_twin/requirements.txt
          else
            pip install httpx feedparser
          fi

      - name: Execute Autonomous Observation Payload
        id: run_script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python services/python/world_cli.py > world_payload.json

          test -s world_payload.json
          python -m json.tool world_payload.json > /dev/null

      - name: Dispatch Secure Payload to Vercel Production
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          WORLDSPECT_INGEST_SECRET: ${{ secrets.WORLDSPECT_INGEST_SECRET }}
        run: |
          test -n "$VERCEL_APP_URL" || (echo "Missing VERCEL_APP_URL secret" && exit 1)
          test -n "$WORLDSPECT_INGEST_SECRET" || (echo "Missing WORLDSPECT_INGEST_SECRET secret" && exit 1)

          curl --fail-with-body -X POST "$VERCEL_APP_URL/api/worldspect/ingest-payload" \
            -H "Authorization: Bearer $WORLDSPECT_INGEST_SECRET" \
            -H "X-SFI-Ingest-Mode: $WORLDSPECT_INGEST_MODE" \
            -H "X-SFI-Measurement-Slot: $WORLDSPECT_MEASUREMENT_SLOT" \
            -H "Content-Type: application/json" \
            --data-binary @world_payload.json

      - name: Execute Canonical Adapter Measurement
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          WORLDSPECT_INGEST_SECRET: ${{ secrets.WORLDSPECT_INGEST_SECRET }}
        run: |
          test -n "$VERCEL_APP_URL" || (echo "Missing VERCEL_APP_URL secret" && exit 1)
          test -n "$WORLDSPECT_INGEST_SECRET" || (echo "Missing WORLDSPECT_INGEST_SECRET secret" && exit 1)

          curl --fail-with-body -X POST "$VERCEL_APP_URL/api/cron/worldspect" \
            -H "Authorization: Bearer $WORLDSPECT_INGEST_SECRET" \
            -H "X-SFI-Ingest-Mode: $WORLDSPECT_INGEST_MODE" \
            -H "X-SFI-Measurement-Slot: $WORLDSPECT_MEASUREMENT_SLOT"

      - name: Verify Canonical Reads
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
        run: |
          test -n "$VERCEL_APP_URL" || (echo "Missing VERCEL_APP_URL secret" && exit 1)
          curl --fail-with-body "$VERCEL_APP_URL/api/worldspect/real"
          curl --fail-with-body "$VERCEL_APP_URL/api/worldspect/trend?days=90&debug=1"
