name: WorldSpect Daily Ingestion

on:
  schedule:
    - cron: '0 3 * * *' # Ejecución automatizada desatendida a las 03:00 AM UTC diariamente
  workflow_dispatch: # Activación manual habilitada desde la interfaz web de GitHub

jobs:
  observe_world:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ingestion Dependencies
        run: |
          if [ -f services/python/cognitive_twin/requirements.txt ]; then
            pip install -r services/python/cognitive_twin/requirements.txt
          else
            pip install httpx feedparser
          fi

      - name: Execute Autonomous Observation
        id: run_script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # El script procesa las señales globales y canaliza el stream a un JSON estático
          python services/python/world_cli.py > world_payload.json

      - name: Dispatch Secure Payload to Vercel Production
        env:
          VERCEL_APP_URL: https://system-friction-hzy7jhyha-juan-antonio-marin-lieras-projects.vercel.app
        run: |
          # Enlace perimetral seguro apuntando directamente al dominio de despliegue Vercel
          curl --fail -X POST "$VERCEL_APP_URL/api/worldspect/ingest-payload" \
            -H "Authorization: Bearer ${{ secrets.WORLDSPECT_INGEST_SECRET }}" \
            -H "Content-Type: application/json" \
            --data-binary @world_payload.json