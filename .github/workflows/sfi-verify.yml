name: SFI Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify SFI boundaries and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check domain boundaries
        run: npm run check:boundaries

      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: sfi-typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 7

      - name: Build
        run: npm run build
