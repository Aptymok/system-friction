name: Studio Redesign Typecheck

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --legacy-peer-deps --silent
      - run: npx tsc --noEmit --pretty false
