name: Studio Redesign Typecheck

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --legacy-peer-deps --silent
      - name: Capture typecheck
        run: |
          set +e
          npx tsc --noEmit --pretty false > studio-typecheck.log 2>&1
          echo $? > studio-typecheck.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: studio-typecheck
          path: |
            studio-typecheck.log
            studio-typecheck.exit
      - name: Enforce typecheck
        run: test "$(cat studio-typecheck.exit)" = "0"
