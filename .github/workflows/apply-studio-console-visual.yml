name: Apply Studio instrument console visual

on:
  push:
    branches:
      - feat/studio-instrument-console-visual

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/studio-instrument-console-visual

      - name: Wire real-data instruments and replace legacy styling
        run: |
          python - <<'PY'
          from pathlib import Path

          shell_path = Path('src/components/studio/production/StudioProductionShell.tsx')
          shell = shell_path.read_text(encoding='utf-8')
          shell = shell.replace("import { useMemo, useState } from 'react';", "import { useState } from 'react';")
          shell = shell.replace(
              "import { StudioUnifiedIntelligence } from './StudioUnifiedIntelligence';",
              "import { StudioUnifiedIntelligence } from './StudioUnifiedIntelligence';\nimport { StudioTelemetryRail, StudioTimelineStrip } from './StudioVisualInstruments';\nimport './studio-console.css';"
          )
          shell = shell.replace("  const css = useMemo(() => productionCss, []);\n", "")
          shell = shell.replace(
              "        <Screen active={active} state={state} onOpenIntake={() => setIntakeOpen(true)} />",
              "        <div className=\"sfi-production__workspace\"><Screen active={active} state={state} onOpenIntake={() => setIntakeOpen(true)} /></div>\n        <StudioTimelineStrip state={state} />"
          )
          shell = shell.replace(
              "      </section>\n      <StudioObjectIntake open={intakeOpen} onClose={() => setIntakeOpen(false)} />\n      <style jsx global>{css}</style>",
              "      </section>\n      <StudioTelemetryRail state={state} />\n      <StudioObjectIntake open={intakeOpen} onClose={() => setIntakeOpen(false)} />"
          )
          marker = "\nconst productionCss = `"
          if marker in shell:
              shell = shell.split(marker, 1)[0].rstrip() + "\n"
          shell_path.write_text(shell, encoding='utf-8')

          header_path = Path('src/components/studio/production/StudioHeader.tsx')
          header_path.write_text("""import type { StudioProductionState } from '@/lib/studio/production/studioProductionTypes';

export function StudioHeader({ state, stage, onOpenIntake }: { state: StudioProductionState; stage: string; onOpenIntake: () => void }) {
  const time = new Date(state.generatedAt).toISOString().slice(11, 19);
  const confidence = Math.max(...state.metricValues.map((metric) => metric.confidence), 0);

  return (
    <header className=\"sfi-production__header\">
      <div className=\"sfi-production__header-title\">
        <span>SFI STUDIO · {state.session.status.toUpperCase()}</span>
        <strong>{state.activeObject.title}</strong>
        <small>{state.activeObject.type.toUpperCase()} · {state.activeObject.analysisStatus}</small>
      </div>
      <div className=\"sfi-production__header-center\">
        <span>SYSTEM FRICTION INSTITUTE</span>
        <strong>STUDIO</strong>
        <small>{stage} · OBJECT INTELLIGENCE ENVIRONMENT</small>
      </div>
      <div className=\"sfi-production__header-state\">
        <span>SYSTEM STATE</span>
        <strong>{state.systemState.toUpperCase()} · {Math.round(confidence * 100)}% MAX CONF</strong>
        <em>{time} UTC · {state.activeObject.readiness.toUpperCase()}</em>
      </div>
      <button type=\"button\" onClick={onOpenIntake}>CARGAR OBJETO</button>
    </header>
  );
}
""", encoding='utf-8')

          intel_path = Path('src/components/studio/production/StudioUnifiedIntelligence.tsx')
          intel = intel_path.read_text(encoding='utf-8')
          intel = intel.replace(
              "import { useEffect, useMemo, useState } from 'react';",
              "import { useEffect, useMemo, useState } from 'react';\nimport { StudioProjectionConsole, StudioReturnConsole, StudioRouteConsole, StudioVectorConsole } from './StudioVisualInstruments';"
          )
          intel = intel.replace(
              "  const selectedRoute = useMemo(() => projection?.strategy.routes.find((route) => route.id === projection.strategy.selectedRouteId) ?? projection?.strategy.routes[0] ?? null, [projection]);",
              "  const selectedRoute = useMemo(() => projection?.strategy.routes.find((route) => route.id === projection.strategy.selectedRouteId) ?? projection?.strategy.routes[0] ?? null, [projection]);\n  const latestOutcome = runDetail?.outcomes[0] ?? null;\n  const latestOutcomeValue = numberValue(latestOutcome?.actual_value ?? latestOutcome?.actualValue);\n  const latestOutcomeFidelity = numberValue(latestOutcome?.intervention_fidelity ?? latestOutcome?.interventionFidelity);"
          )
          intel = intel.replace(
              "      {view === 'systemic' ? (\n        <div className=\"sfi-intel__stack\">",
              "      {view === 'systemic' ? (\n        <div className=\"sfi-intel__stack\">\n          <StudioVectorConsole\n            dominantDomain={projection.world.dominantDomain}\n            tensions={projection.world.crossVectorTensions}\n            attractors={projection.world.inferredAttractors}\n            variables={(synthesis?.mihm.variables ?? []).map((variable) => ({ key: variable.key, label: variable.label, value: variable.value, status: variable.status }))}\n          />"
          )
          intel = intel.replace(
              "      {view === 'projection' ? (\n        <div className=\"sfi-intel__stack\">",
              "      {view === 'projection' ? (\n        <div className=\"sfi-intel__stack\">\n          <StudioProjectionConsole\n            compatibility={projection.fit.score}\n            compatibilityConfidence={projection.fit.confidence}\n            coverage={projection.fit.coverage}\n            prediction={predictive?.prediction ?? null}\n            predictionConfidence={predictive?.confidence ?? null}\n            lower={predictive?.lowerBound ?? null}\n            upper={predictive?.upperBound ?? null}\n            worldConfidence={projection.world.confidence}\n          />"
          )
          intel = intel.replace(
              "      {view === 'decision' ? (\n        <div className=\"sfi-intel__stack\">",
              "      {view === 'decision' ? (\n        <div className=\"sfi-intel__stack\">\n          <StudioRouteConsole routes={projection.strategy.routes} selectedRouteId={projection.strategy.selectedRouteId} />"
          )
          intel = intel.replace(
              "      {view === 'return' ? (\n        <div className=\"sfi-intel__stack\">",
              "      {view === 'return' ? (\n        <div className=\"sfi-intel__stack\">\n          <StudioReturnConsole\n            prediction={predictive?.prediction ?? null}\n            actual={latestOutcomeValue}\n            confidence={predictive?.confidence ?? null}\n            fidelity={latestOutcomeFidelity}\n            learningCount={runDetail?.learningEvents.length ?? 0}\n            outcomeCount={runDetail?.outcomes.length ?? 0}\n          />"
          )
          intel_path.write_text(intel, encoding='utf-8')
          PY

      - name: Commit visual wiring
        run: |
          if git diff --quiet; then
            echo "Visual wiring already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/studio/production/StudioProductionShell.tsx src/components/studio/production/StudioHeader.tsx src/components/studio/production/StudioUnifiedIntelligence.tsx
          git commit -m "style(studio): wire focal instrument console"
          git push origin HEAD:feat/studio-instrument-console-visual
