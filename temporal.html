<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFI · Flujo · Campo de Fricción Sistémica</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
:root{
  --void:#050505;
  --void2:#0c0c0c;
  --ash:#1a1a1a;
  --ash2:#222;
  --paper:#c8c0b0;
  --white:#e4e0d8;
  --oro:#C8A951;
  --neon:#E6FF00;
  --pol:#ff4d4d;
  --eco:#4dff4d;
  --cul:#ffd700;
  --cog:#4d4dff;
  --geo:#00ced1;
  --sys:#ff69b4;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--void);
  color:var(--paper);
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  overflow:hidden;
  height:100vh;
}

/* ───── NAV ───── */
nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:1000;
  padding:16px 48px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(8,8,8,0.88);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--ash2);
}

.nav-logo{
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--oro);
  text-decoration:none;
}

.nav-right{
  display:flex;
  gap:20px;
}

.nav-link{
  font-size:9px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#777;
  text-decoration:none;
}

.nav-link.active,
.nav-link:hover{
  color:var(--neon);
}

/* ───── CANVAS ───── */
#canvas-container{
  width:100vw;
  height:100vh;
}

canvas{
  width:100%;
  height:100%;
  display:block;
  background:var(--void);
}

/* ───── LEGEND ───── */
.legend{
  position:fixed;
  right:20px;
  bottom:60px;
  background:rgba(8,8,8,.85);
  border:1px solid var(--ash2);
  padding:12px 16px;
  font-size:8px;
  backdrop-filter:blur(8px);
}

.legend div{margin-bottom:4px}

.legend span{
  width:10px;
  height:10px;
  display:inline-block;
  margin-right:6px;
}

/* ───── FOOTER ───── */
footer{
  position:fixed;
  bottom:0;left:0;right:0;
  padding:8px 20px;
  font-size:7px;
  letter-spacing:.2em;
  color:var(--ash2);
  border-top:1px solid var(--ash);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">SYSTEM·FRICTION</a>
  <div class="nav-right">
    
    <a href="index.html" class="nav-link">Estado</a>
    <a href="temporal.html" class="nav-link">Temporal</a>
    <a href="flow.html" class="nav-link active">Flujo</a>
    <a href="macro.html" class="nav-link">Macro</a>
    <a href="nodes.html" class="nav-link">Nodos</a>
    <a href="simulation.html" class="nav-link">Simular</a>
  </div>
</nav>

<div id="canvas-container">
  <canvas id="flowCanvas"></canvas>
</div>

<div class="legend">
  <div><span style="background:var(--pol)"></span>POL</div>
  <div><span style="background:var(--eco)"></span>ECO</div>
  <div><span style="background:var(--cul)"></span>CUL</div>
  <div><span style="background:var(--cog)"></span>COG</div>
  <div><span style="background:var(--geo)"></span>GEO</div>
  <div><span style="background:var(--sys)"></span>SYS</div>
  <div style="margin-top:6px;color:var(--neon)">
    Campo vivo · Fricción distribuida
  </div>
  <div style="margin-top:4px">
    IHG = −0.620 · NTI = 0.351 · P(colapso) = 71%
  </div>
</div>

<footer>
  <span>FLOW FIELD · SISTEMA VIVO</span>
  <span>memoria · interferencia · presión</span>
  <span>la circulación ES el sistema</span>
</footer>

<script>
/* ───────────── CONFIGURACIÓN GLOBAL ───────────── */

const PARAMS = {
  IHG: -0.620,
  NTI: 0.351,
  PCOL: 0.71
};

const FIELD_INTENSITY =
  (Math.abs(PARAMS.IHG) + PARAMS.PCOL) * (1 - PARAMS.NTI);

/* ───────────── CANVAS SETUP ───────────── */

const canvas = document.getElementById("flowCanvas");
const ctx = canvas.getContext("2d");
let w, h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ───────────── NODOS COMO FUENTES DE CAMPO ───────────── */

const nodes = [
  {name:"POL", x:0.2, y:0.32, r:24, color:"255,77,77"},
  {name:"ECO", x:0.72, y:0.28, r:24, color:"77,255,77"},
  {name:"CUL", x:0.52, y:0.55, r:24, color:"255,215,0"},
  {name:"COG", x:0.32, y:0.72, r:20, color:"77,77,255"},
  {name:"GEO", x:0.78, y:0.66, r:20, color:"0,206,209"},
  {name:"SYS", x:0.5, y:0.22, r:30, color:"255,105,180"}
];

function nodePos(n){
  return {x:n.x*w,y:n.y*h};
}

/* ───────────── CAMPO VECTORIAL ───────────── */

function getField(x,y){
  let fx=0, fy=0;
  nodes.forEach(n=>{
    const p=nodePos(n);
    const dx=p.x-x;
    const dy=p.y-y;
    const d=Math.hypot(dx,dy)+0.001;
    let force=n.r*0.0006*FIELD_INTENSITY;
    if(n.name==="SYS") force*=1.8;
    fx+=(dx/d)*force;
    fy+=(dy/d)*force;
  });
  return {fx,fy};
}

/* ───────────── COLOR EMERGENTE ───────────── */

function colorAt(x,y){
  let r=0,g=0,b=0,s=0;
  nodes.forEach(n=>{
    const p=nodePos(n);
    const d=Math.hypot(x-p.x,y-p.y)+1;
    const w=1/d;
    const c=n.color.split(",").map(Number);
    r+=c[0]*w; g+=c[1]*w; b+=c[2]*w;
    s+=w;
  });
  return `rgba(${(r/s)|0},${(g/s)|0},${(b/s)|0},`;
}

/* ───────────── PARTÍCULAS CON MEMORIA ───────────── */

const particles=[];
const COUNT=240;

function initParticles(){
  particles.length=0;
  for(let i=0;i<COUNT;i++){
    particles.push({
      x:Math.random()*w,
      y:Math.random()*h,
      vx:0,
      vy:0,
      trail:[]
    });
  }
}
initParticles();

/* ───────────── LOOP PRINCIPAL ───────────── */

let t=0;

function draw(){
  t++;

  ctx.fillStyle="rgba(5,5,5,0.18)";
  ctx.fillRect(0,0,w,h);

  /* Campo visual */
  nodes.forEach(n=>{
    const p=nodePos(n);
    const pulse=0.12+Math.sin(t*0.003)*0.03;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,150);
    g.addColorStop(0,`rgba(${n.color},${pulse})`);
    g.addColorStop(1,"rgba(5,5,5,0)");
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,150,0,Math.PI*2);
    ctx.fill();
  });

  /* Partículas */
  particles.forEach(p=>{
    const f=getField(p.x,p.y);
    p.vx+=f.fx*0.9;
    p.vy+=f.fy*0.9;
    p.vx*=0.965;
    p.vy*=0.965;
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>w) p.vx*=-0.7;
    if(p.y<0||p.y>h) p.vy*=-0.7;

    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>30) p.trail.shift();

    ctx.beginPath();
    for(let i=0;i<p.trail.length-1;i++){
      const a=(i+1)/p.trail.length*0.25;
      ctx.strokeStyle=colorAt(p.x,p.y)+a+")";
      ctx.lineWidth=1.2;
      ctx.moveTo(p.trail[i].x,p.trail[i].y);
      ctx.lineTo(p.trail[i+1].x,p.trail[i+1].y);
    }
    ctx.stroke();
  });

  /* Núcleos */
  nodes.forEach(n=>{
    const p=nodePos(n);
    ctx.shadowBlur=20;
    ctx.shadowColor=`rgb(${n.color})`;
    ctx.fillStyle=`rgb(${n.color})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,n.r,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle="#fff";
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.fillStyle="#fff";
    ctx.font=`bold ${n.r*0.6}px 'IBM Plex Mono'`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(n.name,p.x,p.y);
  });

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
