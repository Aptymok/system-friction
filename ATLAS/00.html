<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SF_2 — Sistema Completo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ============================================================
   VARIABLES Y BASE
============================================================== */

:root {
  --paper: #f4f1ec;
  --ink: #1a1918;
  --gold: #c8a951;
  --mono: 'Courier New', monospace;
  --serif: 'Times New Roman', serif;
  --sans: 'Helvetica', sans-serif;
}

html, body {
  margin: 0;
  padding: 0;
  background: #111;
  color: var(--ink);
  font-family: var(--sans);
}

/* ============================================================
   ESTRUCTURA DE PÁGINAS
============================================================== */

.page {
  width: 100%;
  min-height: 100vh;
  padding: 3rem 4rem;
  box-sizing: border-box;
  position: relative;
}

.pg-white {
  background: var(--paper);
  color: var(--ink);
}

.pg-black {
  background: #000;
  color: #ccc;
}

.page-fold {
  display: flex;
  width: 100%;
  min-height: 100vh;
  background: var(--paper);
  position: relative;
}

.half-l, .half-r {
  width: 50%;
  box-sizing: border-box;
  padding: 3rem;
  position: relative;
}

.half-l.pg-black {
  background: #000;
}

/* ============================================================
   TIPOGRAFÍAS
============================================================== */

.t-title {
  font-size: 2rem;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 1rem;
}

.t-kicker {
  font-size: .75rem;
  letter-spacing: .2em;
  text-transform: uppercase;
}

.t-body {
  font-size: 1rem;
  line-height: 1.7;
}

.t-poem {
  font-size: 1.15rem;
  line-height: 2;
  font-style: italic;
  color: #bbb;
}

.t-large {
  font-size: 1.8rem;
  line-height: 1.3;
}

.t-mono {
  font-family: var(--mono);
  font-size: .85rem;
}

.c-dim {
  opacity: .7;
}

.c-gold {
  color: var(--gold);
}

/* ============================================================
   MARCAS, DECORACIÓN Y PLIEGOS
============================================================== */

.corner-mark {
  position: absolute;
  bottom: 2rem;
  right: 2rem;
  font-size: .75rem;
  opacity: .2;
  font-family: var(--mono);
}

.fold-line {
  height: 100%;
  width: 2px;
  background: rgba(200,169,81,.2);
  position: absolute;
  left: 50%;
  top: 0;
}

.fold-label {
  position: absolute;
  top: 1.5rem;
  left: calc(50% + 1rem);
  font-size: .7rem;
  opacity: .25;
  font-family: var(--mono);
}

/* ============================================================
   COLUMNAS Y CENTRADOS
============================================================== */

.col {
  display: flex;
  flex-direction: column;
}

.center {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pad {
  padding: 3rem;
}

/* ============================================================
   ELEMENTOS ESPECIALES
============================================================== */

.rule-g {
  width: 100%;
  height: 1px;
  background: rgba(200,169,81,.25);
  margin: 1.6rem 0;
}

svg {
  display: block;
}

/* Corrección de overflow SVG */
svg * {
  vector-effect: non-scaling-stroke;
}
/* ============================================================
   FORMATO LIBRO DE ARTE — 22 × 22 cm
   (Para pantalla Y exportación a PDF)
============================================================== */

/* Fijamos proporción cuadrada */
.page, .page-fold {
  width: 22cm;
  min-height: 22cm;
  height: auto;
  margin: 0 auto;
  padding: 3cm 3cm;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}

/* Márgenes amplios de libro de arte */
.pad {
  padding: 2.6cm;
}

/* Separación fuerte entre páginas */
.page, .page-fold {
  page-break-after: always;
}

/* Estética editorial premium */
body {
  background: #e8e6e3;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  letter-spacing: 0.01em;
}

/* Títulos grandes y con autoridad visual */
.t-title {
  font-size: 2.4rem;
  letter-spacing: -0.5px;
  margin-bottom: 1.4rem;
}

/* Textos largos con respiración amplia */
.t-body {
  font-size: 1.25rem;
  line-height: 1.9;
}

/* Poemas/epígrafes como arte */
.t-poem {
  font-size: 1.6rem;
  line-height: 2.2;
  opacity: .88;
}

/* Kicker editorial */
.t-kicker {
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  opacity: .45;
  margin-bottom: 0.8rem;
}

/* Marcas de esquina discretas */
.corner-mark {
  bottom: 1.4cm;
  right: 1.8cm;
  font-size: .75rem;
  opacity: .22;
}

/* Fondos negros más profundos y limpios */
.pg-black {
  background: #000;
  color: #dcdcdc;
}

/* SVG optimizados para formato grande */
svg {
  width: 100%;
  height: 100%;
}

/* Impresión en PDF a tamaño EXACTO 22 × 22 */
@page {
  size: 22cm 22cm;
  margin: 0;
}
</style>
</head>

<body>
