<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>System Friction · Casos SF</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a09;
  --surface:#101010;
  --surface2:#161614;
  --bd:#1e1e1b;
  --tx:#c4c0b5;
  --tx2:#888480;
  --tx3:#484540;
  --bright:#ede9de;
  --ac:#c8a951;
  --ac2:#8a7035;
  --ac4:rgba(200,169,81,.07);
  --neon:#d4f040;
  --fm:'JetBrains Mono', monospace;
  --serif:'EB Garamond', serif;
  --disp:'Syncopate', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--tx);
  font-family:var(--serif);
}

/* HEADER */
#hdr{
  height:46px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 1.5rem;
  border-bottom:1px solid var(--bd);
  background:rgba(10,10,9,.97);
}

.hdr-brand{
  font-family:var(--disp);
  font-size:.62rem;
  letter-spacing:.18em;
  color:var(--ac);
}

.hdr-mod{
  font-family:var(--fm);
  font-size:.56rem;
  color:var(--tx3);
}

/* SECTION */
.section{
  padding:2.2rem 2.6rem 3rem;
}

.kicker{
  font-family:var(--fm);
  font-size:.54rem;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:var(--ac2);
  margin-bottom:1rem;
}

.sec-title{
  font-size:1.6rem;
  color:var(--bright);
  margin-bottom:.4rem;
}

.sec-sub{
  font-family:var(--fm);
  font-size:.6rem;
  color:var(--tx2);
  margin-bottom:1.6rem;
}

/* CAROUSEL */
.casos-carousel{
  display:flex;
  gap:1.5rem;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
}

.casos-carousel::-webkit-scrollbar{display:none}

.caso-card{
  flex:0 0 380px;
  background:var(--surface);
  border:1px solid var(--bd);
  scroll-snap-align:start;
  display:flex;
  flex-direction:column;
}

.caso-header{
  padding:1rem 1.4rem .6rem;
  border-bottom:1px solid var(--bd);
}

.caso-id{
  font-family:var(--fm);
  font-size:.65rem;
  letter-spacing:.1em;
  color:var(--ac);
}

.caso-titulo{
  font-size:1.1rem;
  color:var(--bright);
  margin-top:.3rem;
}

.caso-body{
  padding:.9rem 1.4rem;
  font-size:.75rem;
  color:var(--tx2);
  line-height:1.55;
  border-bottom:1px solid var(--bd);
}

/* EVIDENCIA */
.evidencia{
  padding:.8rem 1.4rem;
  border-bottom:1px solid var(--bd);
}

.evidencia-title{
  font-family:var(--fm);
  font-size:.55rem;
  letter-spacing:.14em;
  color:var(--ac2);
  margin-bottom:.4rem;
}

.evidencia-item{
  font-size:.72rem;
  color:var(--tx2);
  margin-bottom:.25rem;
}

/* ETAPAS */
.etapas{
  display:flex;
  gap:2px;
  padding:.8rem 1.2rem;
  overflow-x:auto;
  scrollbar-width:none;
}

.etapas::-webkit-scrollbar{display:none}

.etapa{
  min-width:220px;
  background:var(--surface2);
  border:1px solid var(--bd);
  padding:.75rem;
}

.etapa-kicker{
  font-family:var(--fm);
  font-size:.52rem;
  letter-spacing:.18em;
  color:var(--ac2);
  margin-bottom:.3rem;
}

.etapa-body{
  font-size:.75rem;
  color:var(--tx2);
}

/* FOOTER CARD */
.caso-footer{
  margin-top:auto;
  padding:1rem 1.4rem;
  display:flex;
  justify-content:flex-end;
  border-top:1px solid var(--bd);
}

.btn-conclusion{
  background:none;
  border:1px solid var(--ac2);
  color:var(--ac);
  font-family:var(--fm);
  font-size:.65rem;
  padding:.42rem 1.2rem;
  cursor:pointer;
}

.btn-conclusion:hover{
  background:var(--ac4);
  color:var(--neon);
}
</style>
</head>

<body>

<header id="hdr">
  <span class="hdr-brand">System Friction</span>
  <span class="hdr-mod">Observatorio · Casos SF</span>
</header>

<!-- CASOS ABIERTOS -->
<section class="section">
  <div class="kicker">Observatorio · Campo activo</div>
  <div class="sec-title">Casos abiertos</div>
  <div class="sec-sub">Evidencia observacional en tiempo real. Sin conclusión emitida.</div>

  <div id="abiertosCarousel" class="casos-carousel"></div>
</section>

<!-- CASOS CERRADOS -->
<section class="section">
  <div class="kicker">Archivo validado</div>
  <div class="sec-title">Casos cerrados</div>
  <div class="sec-sub">Evidencia histórica + etapas posteriores. Conclusión operativa disponible.</div>

  <div id="cerradosCarousel" class="casos-carousel"></div>
</section>

<script src="app.js"></script>
</body>
</html>
