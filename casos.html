<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF · Archivo de Casos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">

<style>
/* ===== TOKENS ===== */
:root {
  --void:#080808;
  --s1:#0f0f0e;
  --s2:#141413;
  --s3:#1a1a18;
  --bd:#222220;
  --bd2:#2e2e2b;
  --tx:#c4c0b5;
  --tx2:#807c74;
  --tx3:#454340;
  --oro:#c8a951;
  --oro2:#8a7035;
  --neon:#d4f040;
  --teal:#2a7060;
  --danger:#9a3030;
  --ok:#3a7048;
  --mono:'IBM Plex Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--void);
  color:var(--tx);
  font-family:var(--mono);
  font-size:12px;
  line-height:1.6;
}
.shell{max-width:900px;margin:0 auto;padding:48px 24px 120px}

/* ===== HEADER ===== */
.hd{border-bottom:1px solid var(--bd);padding-bottom:24px;margin-bottom:32px}
.hd-brand{font-size:10px;letter-spacing:.2em;color:var(--oro)}
.hd-title{font-size:20px;font-weight:600;color:#fff;margin:6px 0}
.hd-sub{font-size:10px;color:var(--tx3)}

/* ===== FILTERS ===== */
.filters{display:flex;border:1px solid var(--bd);margin-bottom:24px}
.filter-btn{
  flex:1;
  background:none;
  border:none;
  border-right:1px solid var(--bd);
  font-size:10px;
  color:var(--tx3);
  padding:8px;
  cursor:pointer;
}
.filter-btn:last-child{border-right:none}
.filter-btn.on{background:var(--s1);color:var(--oro)}
.filter-btn:hover{background:var(--s2);color:#fff}
.filter-count{margin-left:4px;font-size:9px;color:var(--tx2)}

/* ===== CASE ROW ===== */
.case-row{
  display:grid;
  grid-template-columns:90px 1fr auto auto auto;
  gap:12px;
  padding:12px 16px;
  border:1px solid var(--bd);
  border-top:none;
  background:var(--s1);
  cursor:pointer;
}
.case-row:first-child{border-top:1px solid var(--bd)}
.case-row.open{background:var(--s2)}
.case-row.hidden{display:none}

.cr-id{font-size:10px;color:var(--oro)}
.cr-title{font-size:12px;color:#fff}
.cr-system{font-size:10px;color:var(--tx2)}
.cr-ihg{font-size:13px}
.cr-ihg.neg{color:var(--danger)}
.cr-ihg.warn{color:var(--oro)}
.cr-badge{font-size:9px;border:1px solid;padding:3px 8px}
.badge-cerrado{color:var(--danger);border-color:var(--danger)}
.badge-abierto{color:var(--oro);border-color:var(--oro)}
.badge-monitoreo{color:var(--teal);border-color:var(--teal)}
.cr-chevron{font-size:10px;color:var(--tx3)}

/* ===== DOSSIER ===== */
.dossier{border:1px solid var(--bd);border-top:none;background:var(--s2)}
.dossier-head{
  display:flex;
  justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid var(--bd)
}
.dossier-head-title{color:#fff;font-size:14px}
.dossier-head-meta{color:var(--tx2);font-size:10px}
.delta-label{font-size:9px;color:var(--tx3)}
.delta-val{font-size:16px;color:var(--danger)}

/* ===== CHAIN ===== */
.chain{padding:0 0 0 28px;margin:12px 20px;position:relative}
.chain::before{
  content:'';
  position:absolute;
  left:4px;
  top:0;
  bottom:0;
  width:1px;
  background:var(--bd2)
}

.stage{
  border-bottom:1px solid var(--bd);
  padding-left:16px;
}
.stage:last-child{border-bottom:none}

.stage-trigger{
  display:flex;
  justify-content:space-between;
  gap:12px;
  cursor:pointer;
  padding:10px 0;
}
.stage-title{font-size:12px;color:#fff}
.stage-expand{font-size:10px;color:var(--tx3)}

.stage-body{
  display:none;
  font-size:11px;
  padding:12px 0 16px;
  color:var(--tx);
}
.stage.open .stage-body{display:block}

.sb-metrics{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:1px;
  background:var(--bd);
  margin:12px 0;
}
.sb-metric{background:var(--s1);padding:10px}
.sb-metric-key{font-size:9px;color:var(--tx3)}
.sb-metric-val{font-size:16px;color:#fff}
.sb-metric-val.neg{color:var(--danger)}
.sb-metric-val.warn{color:var(--oro)}
.sb-metric-note{font-size:10px;color:var(--tx3)}

.sb-formula{
  font-size:10px;
  background:var(--s1);
  border-left:2px solid var(--oro2);
  padding:10px 14px;
  margin:12px 0;
  line-height:1.8;
}

/* ===== FOOTER ===== */
.footer{
  border-top:1px solid var(--bd);
  margin-top:60px;
  padding-top:20px;
  font-size:10px;
  color:var(--tx3);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap
}
.footer a{color:var(--oro2);text-decoration:none}
</style>
</head>

<body>
<div class="shell">

<header class="hd">
  <div class="hd-brand">System Friction Framework · v1.1</div>
  <div class="hd-title">Archivo de casos empíricos</div>
  <div class="hd-sub">Cadena de evidencia por caso · IHG basal → validación → documento</div>
</header>

<div class="filters" id="filterBar"></div>
<div id="caseList"></div>

<footer class="footer">
  <span>MIHM v2.0 · systemfriction.org</span>
  <span>CC BY 4.0 · APTYMOK</span>
</footer>

</div>

<script>
/* ===== CASOS (MISMA ESTRUCTURA, CORREGIDA) ===== */
const CASOS = [
  {
    id: "SF-CC-0001",
    titulo: "Aguascalientes · La paz termodinámica",
    sistema: "Gobernanza territorial",
    estado: "cerrado",
    ihg_basal: -0.41,
    ihg_final: -0.62,
    fecha_apertura: "2025-11-01",
    fecha_cierre: "2026-02-23",
    etapas: [
      {
        tipo: "senal",
        fecha: "2025-11-01",
        titulo: "Señal: estabilidad mal atribuida",
        cuerpo: "La estabilidad dependía de un pacto implícito no documentado."
      },
      {
        tipo: "diagnostico",
        fecha: "2026-01-15",
        titulo: "Diagnóstico MIHM basal",
        cuerpo: "IHG negativo y NTI bajo umbral.",
        metrics: [
          {k:"IHG",v:"−0.41",cls:"warn"},
          {k:"NTI",v:"0.48",cls:"warn"}
        ],
        formula: "IHG = Σ(C − E)(1 − L)"
      },
      {
        tipo: "validacion",
        fecha: "2026-02-23",
        titulo: "Validación empírica",
        metrics: [
          {k:"IHG post",v:"−0.62",cls:"neg"}
        ]
      },
      {
        tipo: "documento",
        titulo: "Documento público",
        url: "SF-CC-0001.html",
        linkLabel: "Abrir documento"
      }
    ]
  }
];

/* ===== RENDER ===== */
function estadoLabel(e){
  return e==="cerrado"?"CERRADO":
         e==="abierto"?"ABIERTO":"MONITOREO";
}
function estadoClass(e){return "badge-"+e;}
function ihgClass(v){return v<-0.55?"neg":v<-0.2?"warn":"";}

function renderMetrics(metrics){
  if(!metrics) return "";
  return `<div class="sb-metrics">`+
    metrics.map(m=>`
      <div class="sb-metric">
        <div class="sb-metric-key">${m.k}</div>
        <div class="sb-metric-val ${m.cls||""}">${m.v}</div>
        ${m.note?`<div class="sb-metric-note">${m.note}</div>`:""}
      </div>
    `).join("")+
  `</div>`;
}

function renderStage(e){
  let body = e.cuerpo?`<p>${e.cuerpo}</p>`:"";
  if(e.metrics) body += renderMetrics(e.metrics);
  if(e.formula) body += `<div class="sb-formula">${e.formula}</div>`;
  if(e.tipo==="documento"){
    body += `<p><a href="${e.url}" target="_stage-trigger" onclick="this.parentElement.classList.toggle('open')">
        <div class="stage-title">${e.titulo}</div>
        <span class="stage-expand">▶</span>
      </div>
      <div class="stage-body">${body}</div>
    </div>`;
}

function renderDossier(c){
  return `
    <div class="dossier">
      <div class="dossier-head">
        <div>
          <div class="dossier-head-title">${c.titulo}</div>
          <div class="dossier-head-meta">${c.sistema} · ${c.fecha_apertura}${c.fecha_cierre?" → "+c.fecha_cierre:""}</div>
        </div>
        <div>
          <div class="delta-label">ΔIHG</div>
          <div class="delta-val">${(c.ihg_final-c.ihg_basal).toFixed(2)}</div>
        </div>
      </div>
      <div class="chain">
        ${c.etapas.map(renderStage).join("")}
      </div>
    </div>`;
}

function renderRow(c){
  return `
    <div class="case-row" onclick="toggleCase('${c.id}')">
      <span class="cr-id">${c.id}</span>
      <div>
        <div class="cr-title">${c.titulo}</div>
        <div class="cr-system">${c.sistema}</div>
      </div>
      <span class="cr-ihg ${ihgClass(c.ihg_final)}">${c.ihg_final.toFixed(2)}</span>
      <span class="cr-badge ${estadoClass(c.estado)}">${estadoLabel(c.estado)}</span>
      <span class="cr-chevron">▶</span>
    </div>
    <div id="dossier-${c.id}"></div>`;
}

function toggleCase(id){
  document.querySelectorAll("[id^='dossier-']").forEach(d=>d.innerHTML="");
  const c = CASOS.find(x=>x.id===id);
  document.getElementById("dossier-"+id).innerHTML = renderDossier(c);
}

function renderFilters(){
  const estados=["todos","cerrado","abierto","monitoreo"];
  document.getElementById("filterBar").innerHTML = estados.map(e=>
    `<button class="filter-btn" onclick="setFilter('${e}')">${e}</button>`
  ).join("");
}

function setFilter(e){
  document.querySelectorAll(".case-row").forEach((row,i)=>{
    row.style.display = (e==="todos"||CASOS[i].estado===e)?"grid":"none";
    document.getElementById("dossier-"+CASOS[i].id).innerHTML="";
  });
}

function init(){
  document.getElementById("caseList").innerHTML = CASOS.map(renderRow).join("");
  renderFilters();
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
