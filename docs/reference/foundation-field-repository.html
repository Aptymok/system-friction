<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFI — System Friction Institute · Repositorio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&family=Cinzel:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#050507;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --gold3:#f5e0a0;
  --gold-dim:#6b5820;
  --txt:#e8e4d8;
  --txt2:#9a9580;
  --txt3:#4a4840;
  --border:#1a1a20;
  --node-idle:rgba(201,168,76,0.15);
  --node-active:rgba(201,168,76,0.9);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:'Share Tech Mono',monospace;
  cursor:none;
}

/* CURSOR */
#cursor{
  position:fixed;width:12px;height:12px;
  border:1px solid var(--gold);
  border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,border-color .15s;
}
#cursor.hover{width:24px;height:24px;border-color:var(--gold2);background:rgba(201,168,76,.05);}
#cursor-trail{
  position:fixed;width:4px;height:4px;
  background:var(--gold);border-radius:50%;
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  opacity:0.4;
  transition:left .08s,top .08s;
}

/* MAIN CANVAS */
#fieldCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:1;
}

/* OVERLAY HEADER */
#header{
  position:fixed;top:0;left:0;right:0;
  z-index:10;
  padding:20px 32px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(var(--bg),transparent);
  pointer-events:none;
}
.h-institute{
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:6px;color:var(--gold);
  text-transform:uppercase;opacity:.8;
}
.h-sigil{
  font-family:'Cormorant Garamond',serif;
  font-size:11px;font-style:italic;color:var(--txt3);letter-spacing:2px;
}

/* ENTRY SCREEN */
#entry{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  transition:opacity 1.2s ease;
}
#entry.fade{opacity:0;pointer-events:none;}
.entry-pre{
  font-family:'Cinzel',serif;font-size:9px;
  letter-spacing:8px;color:var(--gold-dim);
  text-transform:uppercase;margin-bottom:24px;
  animation:fade-in 2s ease forwards;
}
.entry-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,5vw,64px);
  font-weight:300;color:var(--txt);
  letter-spacing:4px;text-align:center;
  line-height:1.1;
  animation:fade-in 2.5s ease .3s both;
}
.entry-title em{
  font-style:italic;color:var(--gold);
}
.entry-sub{
  margin-top:20px;
  font-size:11px;letter-spacing:3px;color:var(--txt3);
  text-transform:uppercase;text-align:center;
  animation:fade-in 2s ease .9s both;
}
.entry-hint{
  margin-top:48px;
  font-size:10px;letter-spacing:4px;color:var(--txt3);
  text-transform:uppercase;
  animation:blink 2s infinite 2s;
}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:.9}}
@keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* NODE CARD */
#nodeCard{
  position:fixed;z-index:30;
  width:min(520px,90vw);
  background:rgba(5,5,7,.96);
  border:1px solid var(--gold-dim);
  pointer-events:none;
  opacity:0;
  transition:opacity .3s ease;
  transform:translate(-50%,-50%);
}
#nodeCard.visible{opacity:1;pointer-events:all;}
#nodeCard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.nc-header{
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
}
.nc-super{
  font-family:'Cinzel',serif;
  font-size:7px;letter-spacing:4px;color:var(--gold-dim);
  text-transform:uppercase;margin-bottom:4px;
}
.nc-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;color:var(--txt);
  font-style:italic;letter-spacing:1px;
}
.nc-close{
  background:none;border:1px solid var(--border);
  color:var(--txt3);font-size:10px;cursor:pointer;
  padding:4px 8px;font-family:'Share Tech Mono',monospace;
  transition:all .15s;flex-shrink:0;margin-left:12px;margin-top:2px;
}
.nc-close:hover{border-color:var(--gold);color:var(--gold);}

.nc-body{
  padding:18px 20px;
  max-height:60vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent;
}
.nc-body::-webkit-scrollbar{width:3px;}
.nc-body::-webkit-scrollbar-thumb{background:var(--gold-dim);}

.nc-section{margin-bottom:20px;}
.nc-section:last-child{margin-bottom:0;}
.nc-section-title{
  font-size:8px;letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.nc-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.nc-text{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;line-height:1.8;color:var(--txt2);
  font-weight:300;
}
.nc-text strong{color:var(--txt);font-weight:600;}
.nc-text em{color:var(--gold);font-style:italic;}

.nc-mono{
  font-size:11px;line-height:1.9;color:var(--txt2);
  padding:10px 14px;
  border-left:1px solid var(--gold-dim);
  background:rgba(201,168,76,.02);
}
.nc-mono strong{color:var(--gold);}

.nc-table{width:100%;border-collapse:collapse;margin-top:6px;}
.nc-table td{
  padding:8px 10px;font-size:11px;
  border-bottom:1px solid var(--border);
  vertical-align:top;
}
.nc-table td:first-child{color:var(--gold);width:35%;font-size:10px;letter-spacing:1px;}
.nc-table td:last-child{color:var(--txt2);font-family:'Cormorant Garamond',serif;font-size:13px;line-height:1.6;}

.nc-quote{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-style:italic;
  color:var(--txt);line-height:1.7;
  padding:12px 20px;
  border-left:2px solid var(--gold);
  margin:10px 0;
}

.nc-connections{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;
}
.nc-conn{
  padding:2px 8px;font-size:8px;letter-spacing:2px;
  border:1px solid var(--border);color:var(--txt3);
  cursor:pointer;text-transform:uppercase;transition:all .15s;
}
.nc-conn:hover{border-color:var(--gold);color:var(--gold);}

/* MINI MAP */
#minimap{
  position:fixed;bottom:20px;right:20px;z-index:10;
  width:120px;height:80px;
  border:1px solid var(--border);
  background:rgba(5,5,7,.7);
  overflow:hidden;
}
#minimapCanvas{display:block;width:100%;height:100%;}

/* BREADCRUMB */
#breadcrumb{
  position:fixed;bottom:20px;left:32px;z-index:10;
  font-size:8px;letter-spacing:3px;color:var(--txt3);
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
#breadcrumb span{color:var(--gold);}

/* INSTRUCTION */
#instruction{
  position:fixed;bottom:52px;left:32px;z-index:10;
  font-size:8px;letter-spacing:2px;color:var(--txt3);
  text-transform:uppercase;
  opacity:0;transition:opacity .5s;
}
#instruction.show{opacity:1;}

/* ZOOM */
#zoomControls{
  position:fixed;bottom:20px;right:150px;z-index:10;
  display:flex;gap:4px;
}
.zbtn{
  padding:4px 10px;border:1px solid var(--border);
  background:transparent;color:var(--txt3);
  font-family:'Share Tech Mono',monospace;font-size:10px;
  cursor:pointer;transition:all .15s;
}
.zbtn:hover{border-color:var(--gold);color:var(--gold);}
</style>
</head>

/* ========== NODE DATA ========== */
const NODES = [
  {
    id:'manifiesto', label:'Manifiesto\nFundacional', category:'foundation',
    x:0, y:0, r:28, connections:['principios','fundador','mision'],
    super:'Carta · Origen',
    title:'Manifiesto Fundacional',
    content: `
      <div class="nc-section">
        <div class="nc-section-title">Declaración de origen</div>
        <div class="nc-quote">No nacimos para simplificar. Nacimos para hacer visible la fricción que otros eligieron ignorar.</div>
        <div class="nc-text">
          Durante décadas, el consenso tecnológico apostó por una sola dirección: <strong>eliminar el roce.</strong> Interfaces más lisas. Algoritmos que anticipan antes de que el usuario formule. Sistemas que aplastan la ambigüedad y la convierten en datos limpios, exportables, monetizables.
          <br><br>
          El mundo construyó una civilización del confort y la llamó <em>progreso.</em>
          <br><br>
          Pero la realidad no es lisa.
          <br><br>
          La realidad es un campo de fuerzas heterogéneas donde un organismo biológico, una red neuronal, una economía municipal, un ecosistema de micorrizas y una institución centenaria se afectan mutuamente sin compartir un lenguaje común, sin un protocolo de traducción, sin un árbitro que registre la tensión entre ellos.
          <br><br>
          Esa afectación sin traducción es <strong>fricción sistémica.</strong> Y la fricción, contrariamente a lo que el mercado ha enseñado a creer, no es un error del sistema. Es su <em>única señal honesta.</em>
        </div>
      </div>
      <div class="nc-section">
        <div class="nc-section-title">Posición</div>
        <div class="nc-text">
          No somos una compañía de datos. Somos una institución de <strong>infraestructura para la observación sistémica.</strong>
          <br><br>
          La fricción sistémica no es un problema a eliminar. Es una brecha que se debe acortar solo lo necesario para sostener el movimiento termodinámico entre sistemas. Acortarla por completo no produce armonía: <em>produce colapso por homogeneización.</em> Ignorarla produce colapso por saturación.
          <br><br>
          La distancia correcta es la que permite la transferencia de energía sin destruir la diferencia que la hace posible.
        </div>
      </div>
      <div class="nc-connections">
        <div class="nc-conn" onclick="goNode('principios')">→ principios</div>
        <div class="nc-conn" onclick="goNode('fundador')">→ carta fundador</div>
        <div class="nc-conn" onclick="goNode('mision')">→ misión visión valores</div>
      </div>
    `
  },
  {
    id:'principios', label:'Principios\nOperativos', category:'doctrine',
    x:380, y:-180, r:22, connections:['manifiesto','valores','metodologias'],
    super:'Doctrina · Reglas del campo',
    title:'Principios Operativos',
    content: `
      <div class="nc-section">
        <div class="nc-section-title">Los seis principios que no negociamos</div>

          <tr><td>Observabilidad inter-especie</td><td>Nuestros modelos no distinguen entre nodos biológicos, digitales, institucionales o ecosistémicos. Todos son objetos observables bajo la misma infraestructura.</td></tr>
          <tr><td>Traducción antes que técnica</td><td>Ningún instrumento muestra nombres de tablas ni endpoints. Solo lenguaje operativo. La complejidad técnica es nuestra responsabilidad; la claridad operativa, nuestra obligación.</td></tr>

          <tr><td>Override con trazabilidad</td><td>Toda excepción al modelo deja evidencia registrada. No existe anarquía observacional sin responsabilidad documental.</td></tr>
        </table>
      </div>
      <div class="nc-section">
        <div class="nc-section-title">Regla de circuito cerrado</div>
        <div class="nc-text">La coherencia interna sin validación externa no es estabilidad: es una trampa de confirmación. <strong>La detectamos. La alertamos. La intervenimos.</strong></div>
      </div>
      <div class="nc-connections">
        <div class="nc-conn" onclick="goNode('manifiesto')">→ manifiesto</div>
        <div class="nc-conn" onclick="goNode('valores')">→ valores</div>
      </div>

  },
  {
    id:'fundador', label:'Carta\ndel Fundador', category:'foundation',
    x:-320, y:-200, r:20, connections:['manifiesto','actualidad','mision'],
    super:'Aptymok · Origen personal',
    title:'Carta del Fundador',
    content: `
      <div class="nc-section">
        <div class="nc-section-title">Juan Antonio Marín Liera · Aptymok</div>
        <div class="nc-quote">Construí esto durante años en los márgenes de lo que el mundo consideraba trabajo real. En los márgenes, la observación es más honesta.</div>
        <div class="nc-text">

          <br><br>

        </div>
      </div>
      <div class="nc-section">
        <div class="nc-section-title">Sobre la autoridad de lo que aquí se dice</div>
        <div class="nc-text">
          No necesito que estés de acuerdo. Necesito que el sistema que observo sea <em>real.</em> Y la única forma de saber si es real es medirlo en el tiempo, con criterios que no cambien cada vez que el resultado incomoda.
          <br><br>
          Eso es lo que SFI hace. Y lo hace porque alguien decidió que hacerlo era más importante que la comodidad de no hacerlo.
          <br><br>
          <strong>El campo no espera tu permiso para existir.</strong>

      <div class="nc-section">

  {
    id:'actualidad', label:'Observación\nde la Actualidad', category:'context',

    super:'Campo · Contexto actual',
    title:'Observación de la Actualidad',
    content: `
      <div class="nc-section">
        <div class="nc-section-title">El estado del mundo que nos obliga a existir</div>
        <div class="nc-text">
          La crisis contemporánea ya no ocurre como <strong>evento discreto.</strong> Ocurre como estado. Es continua, distribuida, sin protagonistas claros y sin fecha de resolución.

        </div>
      </div>
      <div class="nc-section">
        <div class="nc-section-title">Lo que no haremos</div>
        <div class="nc-text">
          No venderemos certeza donde no existe.<br>
          No simularemos observación donde hay ausencia de datos.<br>
          No nombraremos fenómenos antes de haberlos observado durante el tiempo suficiente.<br><br>
          <strong>La deuda de realidad no se paga con narrativa. Se paga con evidencia.</strong>
        </div>
      </div>
      <div class="nc-connections">
        <div class="nc-conn" onclick="goNode('mision')">→ misión visión valores</div>
        <div class="nc-conn" onclick="goNode('metodologias')">→ metodologías</div>
      </div>
    `
  },
  {
    id:'mision', label:'Misión · Visión\nValores', category:'doctrine',
    x:120, y:280, r:24, connections:['manifiesto','principios','valores','ecosistema'],
    super:'Doctrina · Propósito institucional',
    title:'Misión · Visión · Valores',
    content: `
      <div class="nc-section">
        <div class="nc-section-title">Misión</div>
        <div class="nc-text">

  {

    super:'Técnico · Núcleo metodológico',
    title:'Metodologías y Modelos Aplicados',
    content: `
      <div class="nc-section">
        <div class="nc-section-title">El núcleo que no es metáfora</div>
        <div class="nc-text">
          SFI opera sobre un núcleo metodológico propio, construido durante años de observación empírica sobre sistemas reales en dominios heterogéneos. Estos modelos no son metáforas: son <strong>instrumentos formalizados con ecuaciones, parámetros verificables y predicciones contrastables.</strong>

      <div class="nc-section">
        <div class="nc-section-title">Ecuación fundamental del campo</div>

/* ========== CANVAS ENGINE ========== */
const canvas = document.getElementById('fieldCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');

let W, H;
let camX = 0, camY = 0, camScale = 1;
let targetCamX = 0, targetCamY = 0, targetScale = 1;
let dragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};
let mouseX = 0, mouseY = 0;
let hoveredNode = null;
let activeNodeId = null;
let t = 0;
let entered = false;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* PARTICLE SYSTEM */
const particles = [];
for(let i=0;i<80;i++){
  particles.push({
    x:(Math.random()-0.5)*2200,
    y:(Math.random()-0.5)*1600,
    vx:(Math.random()-.5)*0.15,
    vy:(Math.random()-.5)*0.15,
    r:Math.random()*1.2+0.3,
    alpha:Math.random()*0.25+0.05,
  });
}

/* CONNECTION MAP */
const connMap = {};
NODES.forEach(n=>{connMap[n.id]=n;});

/* WORLD → SCREEN */
function wtx(wx){ return (wx - camX) * camScale + W/2; }
function wty(wy){ return (wy - camY) * camScale + H/2; }
function stw(sx){ return (sx - W/2) / camScale + camX; }
function sth(sy){ return (sy - H/2) / camScale + camY; }

/* DRAW */
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050507';
  ctx.fillRect(0,0,W,H);

  // GRID
  const gridStep = 50 * camScale;
  const offX = ((W/2 - camX * camScale) % gridStep + gridStep) % gridStep;
  const offY = ((H/2 - camY * camScale) % gridStep + gridStep) % gridStep;
  ctx.strokeStyle = 'rgba(255,255,255,0.022)';
  ctx.lineWidth = 0.5;
  for(let x=offX;x<W;x+=gridStep){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=offY;y<H;y+=gridStep){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // PARTICLES
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    const px=wtx(p.x), py=wty(p.y);
    if(px<-50||px>W+50||py<-50||py>H+50) return;
    ctx.beginPath();ctx.arc(px,py,p.r*camScale,0,Math.PI*2);
    ctx.fillStyle=`rgba(201,168,76,${p.alpha})`;
    ctx.fill();
  });

  // CONNECTIONS
  NODES.forEach(n=>{
    n.connections.forEach(cid=>{
      const nb=connMap[cid];
      if(!nb) return;
      const ax=wtx(n.x), ay=wty(n.y);
      const bx=wtx(nb.x), by=wty(nb.y);
      const isActive=(n.id===activeNodeId||cid===activeNodeId);
      const alpha = isActive ? 0.55 : 0.12;
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
      ctx.strokeStyle=`rgba(201,168,76,${alpha})`;
      ctx.lineWidth = isActive ? 1.2 : 0.5;
      ctx.setLineDash(isActive?[]:[4,8]);
      ctx.stroke();
      ctx.setLineDash([]);
      // pulse dot
      if(isActive){
        const frac = (Math.sin(t*1.5 + n.x*.01)*0.5+0.5);
        const px=ax+(bx-ax)*frac, py=ay+(by-ay)*frac;
        ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);
        ctx.fillStyle='rgba(201,168,76,0.8)';ctx.fill();
      }
    });
  });

  // NODES
  NODES.forEach(n=>{
    const nx=wtx(n.x), ny=wty(n.y);
    const nr=n.r*camScale;
    const isHov=(hoveredNode===n.id);
    const isAct=(activeNodeId===n.id);
    const pulse = isAct ? 1+0.06*Math.sin(t*2) : isHov ? 1.04 : 1;

    // category color
    const cols = {
      foundation:'rgba(201,168,76,',
      doctrine:'rgba(160,140,80,',
      context:'rgba(140,110,60,',
      technical:'rgba(100,140,180,',
      platform:'rgba(180,150,80,',
    };
    const c = cols[n.category]||'rgba(201,168,76,';

    // outer ring
    ctx.beginPath();ctx.arc(nx,ny,nr*1.7*pulse,0,Math.PI*2);
    ctx.strokeStyle=c+(isAct?0.18:isHov?0.12:0.06)+')';
    ctx.lineWidth=0.5;ctx.stroke();

    // glow
    const g=ctx.createRadialGradient(nx,ny,0,nx,ny,nr*1.5);
    g.addColorStop(0,c+(isAct?0.22:isHov?0.16:0.06)+')');
    g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(nx,ny,nr*1.5*pulse,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();

    // body
    ctx.beginPath();ctx.arc(nx,ny,nr*pulse,0,Math.PI*2);
    ctx.fillStyle=c+(isAct?0.18:isHov?0.12:0.06)+')';
    ctx.fill();
    ctx.strokeStyle=c+(isAct?0.9:isHov?0.7:0.3)+')';
    ctx.lineWidth=isAct?1.5:0.8;ctx.stroke();

    // center dot
    ctx.beginPath();ctx.arc(nx,ny,2.5,0,Math.PI*2);
    ctx.fillStyle=c+(isAct?1:0.7)+')';ctx.fill();

    // label
    if(camScale>0.45){
      const lines=n.label.split('\n');
      ctx.fillStyle=isAct?'rgba(232,228,216,0.95)':isHov?'rgba(232,228,216,0.7)':'rgba(154,149,128,0.5)';
      const fs=Math.max(9,Math.min(13,11*camScale));
      ctx.font=`${fs}px 'Share Tech Mono'`;
      ctx.textAlign='center';
      lines.forEach((ln,i)=>{
        ctx.fillText(ln, nx, ny+nr*pulse+14+(i*13));
      });
    }
  });

  // MINIMAP
  drawMinimap();

  // LERP camera
  camX += (targetCamX - camX) * 0.07;
  camY += (targetCamY - camY) * 0.07;
  camScale += (targetScale - camScale) * 0.07;

  t += 0.016;
  requestAnimationFrame(draw);
}
draw();

function drawMinimap(){
  mmCtx.clearRect(0,0,120,80);
  mmCtx.fillStyle='rgba(5,5,7,0.9)';mmCtx.fillRect(0,0,120,80);
  const s=0.06;
  NODES.forEach(n=>{
    const nx=60+n.x*s, ny=40+n.y*s;
    mmCtx.beginPath();mmCtx.arc(nx,ny,2,0,Math.PI*2);
    mmCtx.fillStyle=n.id===activeNodeId?'rgba(201,168,76,1)':'rgba(201,168,76,0.3)';
    mmCtx.fill();
  });
  // viewport rect
  const vx=60+camX*s, vy=40+camY*s;
  const vw=(W/camScale)*s, vh=(H/camScale)*s;
  mmCtx.strokeStyle='rgba(201,168,76,0.25)';
  mmCtx.lineWidth=1;
  mmCtx.strokeRect(vx-vw/2,vy-vh/2,vw,vh);
}

/* ========== INTERACTION ========== */
const cursor = document.getElementById('cursor');
const cursorTrail = document.getElementById('cursor-trail');

document.addEventListener('mousemove',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
  setTimeout(()=>{
    cursorTrail.style.left=e.clientX+'px';
    cursorTrail.style.top=e.clientY+'px';
  },60);

  if(!entered) return;
  if(dragging){
    const dx=(e.clientX-dragStart.x)/camScale;
    const dy=(e.clientY-dragStart.y)/camScale;
    targetCamX=camStart.x-dx;
    targetCamY=camStart.y-dy;
  }

  const wx=stw(e.clientX), wy=sth(e.clientY);
  let found=null;
  NODES.forEach(n=>{
    const dx=n.x-wx, dy=n.y-wy;
    if(Math.sqrt(dx*dx+dy*dy)<n.r*1.4) found=n.id;
  });
  hoveredNode=found;
  cursor.classList.toggle('hover',!!found);
  canvas.style.cursor=found?'none':'none';
});

canvas.addEventListener('mousedown',e=>{
  if(!entered) return;
  dragging=true;
  dragStart={x:e.clientX,y:e.clientY};
  camStart={x:targetCamX,y:targetCamY};
});

document.addEventListener('mouseup',e=>{
  if(!entered){
    // entry click
    enterField();
    return;
  }
  if(dragging){
    const moved=Math.abs(e.clientX-dragStart.x)+Math.abs(e.clientY-dragStart.y);
    if(moved<6 && hoveredNode){
      openNode(hoveredNode);
    }
  }
  dragging=false;
});

canvas.addEventListener('wheel',e=>{
  if(!entered) return;
  e.preventDefault();
  const factor=e.deltaY>0?0.88:1.14;
  const newScale=Math.max(0.3,Math.min(3,targetScale*factor));
  targetScale=newScale;
},{passive:false});

function enterField(){
  const entry=document.getElementById('entry');
  entry.classList.add('fade');
  setTimeout(()=>{entry.style.display='none';},1200);
  entered=true;
  document.getElementById('instruction').classList.add('show');
  setTimeout(()=>{document.getElementById('instruction').classList.remove('show');},4000);
}

function openNode(id){
  const n=connMap[id];
  if(!n) return;
  activeNodeId=id;
  document.getElementById('ncSuper').textContent=n.super;
  document.getElementById('ncTitle').textContent=n.title;
  document.getElementById('ncBody').innerHTML=n.content;
  document.getElementById('bcNode').textContent=n.label.replace('\n',' · ');

  // position card intelligently
  const card=document.getElementById('nodeCard');
  card.classList.add('visible');
  const nx=wtx(n.x), ny=wty(n.y);
  let cx=nx, cy=ny;
  // offset to not overlap node
  const cw=520, ch=400;
  if(nx>W*0.55) cx=nx-cw*0.5-n.r*camScale-20;
  else cx=nx+cw*0.5+n.r*camScale+20;
  cy=Math.max(ch/2+20,Math.min(H-ch/2-20,ny));
  card.style.left=cx+'px';
  card.style.top=cy+'px';

  // ease camera toward node
  targetCamX=n.x;
  targetCamY=n.y;
}

function closeCard(){
  document.getElementById('nodeCard').classList.remove('visible');
  activeNodeId=null;
  document.getElementById('bcNode').textContent='campo';
}

function goNode(id){
  closeCard();
  setTimeout(()=>openNode(id),300);
}

function zoom(f){
  targetScale=Math.max(0.3,Math.min(3,targetScale*f));
}
function resetView(){
  targetCamX=0;targetCamY=0;targetScale=1;
  closeCard();
}

// Entry click
document.getElementById('entry').addEventListener('click',enterField);
</script>
